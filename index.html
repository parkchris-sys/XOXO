<title>Send to All</title>
<script>
const SOUND_PATHS={ui_click:"./sounds/ui_click.wav",ui_hover:"./sounds/ui_hover.wav",stage_success:"./sounds/stage_success.wav",wrong_click:"./sounds/wrong_click.wav",stage_fail:"./sounds/stage_fail.wav",timer_warning:"./sounds/timer_warning.wav",popup_open:"./sounds/popup_open.wav",final_send:"./sounds/final_send.wav",game_clear:"./sounds/game_clear.wav",typing_key:"./sounds/typing_key.wav",stamp:"./sounds/stamp.wav",drag_drop:"./sounds/drag_drop.wav",file_select:"./sounds/file_select.wav",file_error:"./sounds/file_error.wav"};
let soundMuted=false,soundVolume=.42;const soundCache={};
function preloadSounds(){Object.keys(SOUND_PATHS).forEach(k=>{const a=new Audio(SOUND_PATHS[k]);a.preload="auto";a.volume=soundVolume;soundCache[k]=a;});}
function playSound(name,volume){if(soundMuted||!SOUND_PATHS[name])return;try{const base=soundCache[name]||new Audio(SOUND_PATHS[name]);soundCache[name]=base;const a=base.cloneNode(true);a.volume=typeof volume==="number"?volume:soundVolume;a.play().catch(()=>{});}catch(e){}}
document.addEventListener("click",()=>{preloadSounds();},{once:true});
</script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Malgun Gothic","맑은 고딕",sans-serif;background:#e8ecf0;color:#222;min-height:100vh;}

  /* ── Global header ── */
  #gw-header{background:#1e3a5f;color:#fff;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
  .gw-logo{font-size:16px;font-weight:700;letter-spacing:-.2px;}
  .gw-logo span{font-size:11px;font-weight:400;opacity:.6;margin-left:10px;vertical-align:middle;}
  #gw-timer-wrap{display:none;align-items:center;gap:8px;font-size:12px;opacity:.8;}
  #gw-timer-wrap span{font-size:11px;}
  #timer{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;min-width:44px;text-align:right;color:#fff;}
  #timer.warn{color:#ff7675;}

  /* ── Progress bar ── */
  #progress{height:3px;background:#2d507e;}
  #progress>div{height:100%;background:#27ae60;width:0;transition:width .4s;}

  /* ── Body layout ── */
  #gw-body{display:flex;gap:20px;padding:24px 32px 40px;max-width:1200px;margin:0 auto;align-items:flex-start;}
  #gw-left{flex:1;min-width:0;}
  #gw-right{width:220px;flex-shrink:0;display:none;flex-direction:column;gap:14px;}

  /* ── Document card (used by gimmicks via .card) ── */
  .card{background:#fff;border:1px solid #d4dbe5;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;margin-bottom:14px;}
  .doc-title{font-size:13px;font-weight:700;color:#1e3a5f;padding:12px 18px;border-bottom:1px solid #e8ecf0;background:#f5f7fa;margin-bottom:0;}
  .doc-body{font-size:14px;line-height:1.8;color:#333;padding:18px 18px 6px;}
  .card>.row,.card>button,.card>label,.card>.hint,.card>.warnbox,.card>.progbar,.card>.scrollbox,.card>div:not(.doc-title):not(.doc-body){margin-left:18px;margin-right:18px;}
  .card>button,.card>.row{padding-bottom:0;margin-bottom:14px;}

  /* ── Sidebar cards ── */
  .side-card{background:#fff;border:1px solid #d4dbe5;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:16px;}
  .side-label{font-size:10px;color:#8fa3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
  .side-val{font-size:14px;font-weight:700;color:#1e3a5f;margin-bottom:12px;}
  .side-val:last-child{margin-bottom:0;}
  .side-divider{height:1px;background:#eef1f5;margin:8px 0;}

  /* ── Full-width panels (start / fail / win) ── */
  .panel-wrap{display:flex;align-items:flex-start;justify-content:center;padding:40px 0;}
  .panel{background:#fff;border:1px solid #d4dbe5;border-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.09);padding:44px 52px;max-width:580px;width:100%;}
  .panel-title{font-size:20px;font-weight:700;color:#1e3a5f;margin-bottom:10px;}
  .panel-sub{font-size:14px;color:#555;line-height:1.8;margin-bottom:28px;}

  /* ── Shared UI ── */
  .row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;}

  /* Buttons */
  button.b{height:36px;padding:0 20px;border:none;border-radius:3px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:filter .12s;letter-spacing:-.1px;}
  button.b:hover:not(:disabled){filter:brightness(.93);}
  button.b:active:not(:disabled){filter:brightness(.87);}
  .b.green{background:#27ae60;color:#fff;}
  .b.gray{background:#e8ecf0;color:#444;border:1px solid #d0d8e2;}
  .b.red{background:#c0392b;color:#fff;}
  .b.big{height:44px;padding:0 32px;font-size:15px;}
  .b.small{height:30px;padding:0 12px;font-size:12px;}
  .b.disabled{background:#f0f3f6;color:#a0aab4;border:1px solid #dde2e8;cursor:not-allowed;filter:none;}

  /* Hint / notice */
  .hint{font-size:12px;color:#8fa3b8;margin-bottom:10px;line-height:1.5;}
  .warnbox{background:#fffbf0;border:1px solid #e8d48a;color:#7a600a;padding:10px 14px;border-radius:3px;margin-bottom:12px;font-size:13px;line-height:1.5;}

  /* Modal overlay + popup */
  .overlay{position:fixed;inset:0;background:rgba(30,58,95,.38);display:flex;align-items:center;justify-content:center;z-index:50;}
  .popup{background:#fff;border-radius:4px;padding:0;width:90%;max-width:440px;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.18);overflow:hidden;}
  .popup .x{position:absolute;top:10px;right:14px;font-size:18px;cursor:pointer;color:#aaa;line-height:1;background:none;border:none;font-family:inherit;}
  .popup-hdr{background:#f5f7fa;border-bottom:1px solid #e2e8f0;padding:14px 20px;font-size:14px;font-weight:700;color:#1e3a5f;}
  .popup-body{padding:18px 20px;font-size:14px;color:#444;line-height:1.7;}
  .popup-footer{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px;background:#fafbfc;}
  .center{text-align:center;}

  /* Inputs & selects */
  input.txt,select.sel{width:100%;height:36px;padding:0 12px;font-size:14px;border:1px solid #cdd4dd;border-radius:3px;font-family:inherit;outline:none;color:#222;background:#fff;}
  input.txt:focus,select.sel:focus{border-color:#3d8bcd;box-shadow:0 0 0 2px rgba(61,139,205,.12);}
  select.sel{cursor:pointer;}

  /* Checkboxes */
  .cbrow{display:flex;align-items:center;gap:10px;padding:9px 12px;font-size:13px;cursor:pointer;border:1px solid transparent;border-radius:3px;transition:background .1s;}
  .cbrow:hover{background:#f5f7fa;}
  .cbrow input[type=checkbox]{width:15px;height:15px;accent-color:#27ae60;cursor:pointer;flex-shrink:0;}

  /* Word chips */
  .chip{display:inline-block;padding:6px 14px;background:#f0f4f8;border:1px solid #cdd4dd;border-radius:3px;margin:3px;cursor:pointer;font-size:13px;transition:all .1s;}
  .chip:hover{background:#e4eaf2;}
  .chip.on{background:#27ae60;color:#fff;border-color:#27ae60;}

  /* CAPTCHA tiles */
  .tile{display:inline-block;width:30%;margin:1.5%;padding:14px 6px;text-align:center;border:1px solid #cdd4dd;border-radius:3px;cursor:pointer;background:#fafbfc;font-size:13px;vertical-align:top;transition:all .1s;}
  .tile:hover{background:#f0f4f8;}
  .tile.on{border-color:#27ae60;background:#eaf6ef;color:#276749;}

  /* Scroll doc */
  .scrollbox{max-height:200px;overflow:auto;border:1px solid #d4dbe5;border-radius:3px;padding:12px 14px;background:#fafbfc;font-size:13px;line-height:1.8;color:#444;}

  /* File list */
  .filerow{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #d4dbe5;border-radius:3px;margin-bottom:6px;cursor:pointer;background:#fff;font-size:13px;color:#333;transition:background .1s;}
  .filerow::before{content:"📄";font-size:16px;flex-shrink:0;}
  .filerow:hover{background:#f5f7fa;border-color:#b8c4d0;}

  /* Stamp */
  .stampbox{display:inline-block;width:30%;margin:1.5%;height:68px;border:1px dashed #b7c0cc;border-radius:3px;text-align:center;line-height:68px;font-size:12px;vertical-align:top;color:#8fa3b8;background:#fafbfc;}

  /* Forbidden zone */
  .redzone{position:absolute;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.28);border-radius:2px;}

  /* Fix-type clickable span */
  .fixspan{color:inherit;cursor:pointer;}
  .fixspan:hover{text-decoration:underline;text-decoration-color:#b0b8c4;text-decoration-style:dotted;background:#f5f5f5;}

  /* Progress bar */
  .progbar{height:6px;background:#e2e6ec;border-radius:3px;overflow:hidden;margin-top:10px;}
  .progbar>div{height:100%;background:#27ae60;width:0;transition:width .15s;}
  /* legacy compat */
  .center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:16px;}
  .big-title{font-size:24px;font-weight:700;color:#1e3a5f;}

  /* ── Document card internals ── */
  .doc-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:#f5f7fa;border-bottom:1px solid #e2e8f0;}
  .doc-card-name{font-size:14px;font-weight:700;color:#1a2f4a;}
  .doc-status-badge{font-size:11px;padding:3px 10px;border-radius:3px;background:#e8f5e9;color:#2e7d32;font-weight:600;border:1px solid #c8e6c9;}
  .doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #e2e8f0;}
  .doc-meta-row{display:contents;}
  .dm-label{font-size:11px;color:#8fa3b8;padding:7px 12px 7px 20px;border-right:1px solid #e2e8f0;background:#fafbfc;}
  .dm-val{font-size:12px;color:#333;padding:7px 20px 7px 10px;}
  .doc-info-wrap{padding:14px 20px;border-bottom:1px solid #e2e8f0;}
  .doc-info-table{width:100%;border-collapse:collapse;font-size:13px;}
  .doc-info-table th{width:80px;text-align:left;color:#8fa3b8;font-weight:500;padding:4px 0;vertical-align:top;}
  .doc-info-table td{color:#333;padding:4px 0;}
  .doc-review-area{padding:18px 20px 14px;}
  .doc-review-label{font-size:11px;color:#8fa3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
  /* override card child margins inside review area */
  .doc-review-area .row{margin-left:0;margin-right:0;margin-top:12px;}
  .doc-review-area button{margin-left:0;}
  .doc-review-area .hint{margin-bottom:8px;}
  .doc-review-area .warnbox{margin-left:0;margin-right:0;}
  .doc-review-area .progbar{margin-left:0;}
  .doc-review-area .scrollbox{margin-left:0;margin-right:0;}
  .doc-review-area input.txt,.doc-review-area select.sel{margin:0;}
  /* doc-body inside review area */
  .doc-body{font-size:14px;line-height:1.8;color:#333;padding:0;margin-bottom:14px;}
</style>

<div id="gw-header">
  <div class="gw-logo">Send to All <span>재택근무 동의 시스템</span></div>
  <div id="gw-timer-wrap"><span>남은 시간</span><span id="timer">90</span></div>
</div>
<div id="progress"><div id="progfill"></div></div>
<div id="gw-body">
  <div id="gw-left"><div id="stage"></div></div>
  <div id="gw-right">
    <div class="side-card">
      <div class="side-label">진행 단계</div>
      <div class="side-val" id="side-stage">— / 15</div>
      <div class="side-divider"></div>
      <div class="side-label">현재 대상자</div>
      <div class="side-val" id="side-name">—</div>
      <div class="side-divider"></div>
      <div class="side-label">동의 완료</div>
      <div class="side-val" id="side-done">0 / 14</div>
    </div>
  </div>
</div>

<script>
const NAMES = ["박주현","황강수","최지혁","김철균","정승원","이성민","최귀현","김철웅","김인성","김용직","김성훈","김상은","표주영","조은비"];
const CORRECT = "동의합니다";
const $ = id => document.getElementById(id);
const stageEl = $("stage");
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function el(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function altName(n){ // 1 char difference
  const arr=[...n]; const i=Math.floor(Math.random()*arr.length);
  const pool="가나다라민준서현우진호영수철웅성은비주";
  let c; do{ c=pool[Math.floor(Math.random()*pool.length)]; }while(c===arr[i]);
  arr[i]=c; return arr.join("");
}

// ===== GAME STATE =====
let state = { stage:1, order:[], teammates:[], timer:90, tInt:null, cleanup:null, locked:false };

function showSidebar(on){
  const r=$("gw-right"), t=$("gw-timer-wrap");
  r.style.display=on?"flex":"none";
  t.style.display=on?"flex":"none";
}
function updateSidebar(){
  const mate=state.teammates[(state.stage-1)%state.teammates.length]||"—";
  $("side-stage").textContent=state.stage+" / 15";
  $("side-name").textContent=mate;
  $("side-done").textContent=(state.stage-1)+" / 14";
}
function clearStage(){
  if(state.tInt){ clearInterval(state.tInt); state.tInt=null; }
  if(state.cleanup){ try{state.cleanup();}catch(e){} state.cleanup=null; }
  stageEl.innerHTML="";
  document.querySelectorAll(".overlay").forEach(o=>o.remove());
  state.locked=false;
}

function startTimer(){
  state.timer=90; updateTimer(); let warnPlayed=false;
  state.tInt=setInterval(()=>{
    state.timer--; updateTimer();
    if(state.timer<=10&&!warnPlayed){warnPlayed=true;playSound('timer_warning');}
    if(state.timer<=0){ clearInterval(state.tInt); fail("시간 초과"); }
  },1000);
}
function updateTimer(){
  const t=$("timer"); t.textContent=state.timer;
  t.classList.toggle("warn", state.timer<=10);
}

function fail(reason){
  if(state.locked) return; state.locked=true; playSound('stage_fail');
  console.log("[fail]", reason);
  clearStage(); showSidebar(false);
  const wrap=el("div","panel-wrap");
  const p=el("div","panel");
  const badge=el("div"); badge.style.cssText="display:inline-block;background:#fdf2f2;border:1px solid #f5c6cb;color:#a94442;font-size:12px;font-weight:600;padding:4px 12px;border-radius:3px;margin-bottom:16px;";
  badge.textContent="반려";
  p.appendChild(badge);
  p.appendChild(el("div","panel-title","승인 요청이 반려되었습니다."));
  const sub=el("div","panel-sub"); sub.style.color="#666";
  sub.textContent="재택근무 시행 동의 절차가 중단되었습니다. 처음부터 다시 진행해주세요.";
  p.appendChild(sub);
  const b=el("button","b green","처음부터 다시 진행"); b.onclick=()=>startRun(); p.appendChild(b);
  wrap.appendChild(p); stageEl.appendChild(wrap);
}

function success(){
  if(state.locked) return; state.locked=true; playSound('stage_success');
  if(state.tInt) clearInterval(state.tInt);
  state.stage++;
  if(state.stage>15){ win(); return; }
  clearStage(); setTimeout(loadStage, 250);
}

function win(){
  playSound('game_clear'); clearStage(); showSidebar(false);
  const wrap=el("div","panel-wrap");
  const p=el("div","panel");
  p.style.cssText+="max-width:440px;text-align:center;padding:40px 32px;";

  const stamp=el("div");
  stamp.style.cssText="display:inline-block;border:3px solid #27ae60;border-radius:50%;width:72px;height:72px;line-height:72px;font-size:32px;color:#27ae60;margin-bottom:20px;";
  stamp.textContent="✓";
  p.appendChild(stamp);

  p.appendChild(el("div","panel-title","주 1회 재택근무가 시작됩니다."));

  const sub=el("div","panel-sub");
  sub.style.cssText="color:#555;font-size:14px;line-height:1.9;margin:16px 0 24px;";
  sub.innerHTML="전 구성원 동의 완료.<br>다음 주 수요일부터 시행됩니다.<br><span style='font-size:12px;color:#99a4b0;'>수고하셨습니다.</span>";
  p.appendChild(sub);

  const meta=el("div");
  meta.style.cssText="font-size:11px;color:#b0bac4;border-top:1px solid #edf0f4;padding-top:16px;line-height:2;";
  const now=new Date(); const hh=String(now.getHours()).padStart(2,"0"); const mm2=String(now.getMinutes()).padStart(2,"0");
  meta.innerHTML="수신: 전 구성원 &nbsp;·&nbsp; 발송: "+hh+":"+mm2+" &nbsp;·&nbsp; 발신: 인사팀";
  p.appendChild(meta);

  wrap.appendChild(p); stageEl.appendChild(wrap);
}

function loadStage(){
  clearStage();
  showSidebar(true);
  updateSidebar();
  $("progfill").style.width=((state.stage-1)/15*100)+"%";
  const teammate=state.teammates[(state.stage-1)%state.teammates.length];
  const prev=state.stage>1?state.teammates[(state.stage-2)%state.teammates.length]:teammate;
  const ctx={ teammate, prevTeammate:prev, container:stageEl,
    onSuccess:()=>{ $("progfill").style.width=(state.stage/15*100)+"%"; success(); },
    onFail:(r)=>{ playSound('wrong_click'); fail(r||"잘못된 동작"); } };
  startTimer();
  if(state.stage===15){ state.cleanup=bossStage(ctx); return; }
  const gk=state.order[state.stage-1];
  state.cleanup=GIMMICKS[gk](ctx);
}

// helper: standard doc header card
function docCard(teammate, bodyHTML){
  const c=el("div","card");
  // header
  const hdr=el("div","doc-card-hdr");
  hdr.appendChild(el("span","doc-card-name", teammate+"님의 재택근무 시행 동의서"));
  hdr.appendChild(el("span","doc-status-badge","동의 대기"));
  c.appendChild(hdr);
  // meta
  const meta=el("div","doc-meta");
  meta.innerHTML=`
    <div class="doc-meta-row"><span class="dm-label">문서번호</span><span class="dm-val">HR-2024-0519</span><span class="dm-label">기안자</span><span class="dm-val">인사팀</span></div>
    <div class="doc-meta-row"><span class="dm-label">기안일</span><span class="dm-val">2024.05.20 09:30</span><span class="dm-label">상태</span><span class="dm-val">동의 대기</span></div>`;
  c.appendChild(meta);
  // fixed doc info
  const infoWrap=el("div","doc-info-wrap");
  infoWrap.innerHTML=`<table class="doc-info-table">
    <tr><th>시행일</th><td>다음 주 수요일</td></tr>
    <tr><th>대상</th><td>전 구성원</td></tr>
    <tr><th>기준</th><td>팀별 업무 상황에 따라 요일 조율</td></tr>
  </table>`;
  c.appendChild(infoWrap);
  // gimmick review area
  const rev=el("div","doc-review-area");
  rev.appendChild(el("div","doc-review-label","검토 항목"));
  const b=el("div","doc-body"); b.innerHTML=bodyHTML||"주 1회 재택근무 시행에 동의하시겠습니까?";
  rev.appendChild(b);
  c.appendChild(rev);
  // proxy: gimmick calls c.appendChild/insertBefore → redirected into rev
  const _oa=c.appendChild.bind(c), _oi=c.insertBefore.bind(c);
  c.appendChild=(child)=>{
    if(child===hdr||child===meta||child===infoWrap||child===rev)return _oa(child);
    return rev.appendChild(child);
  };
  c.insertBefore=(child,ref)=>{
    if(ref&&ref.parentNode===rev)return rev.insertBefore(child,ref);
    return _oi(child,ref);
  };
  return c;
}

// ===================== GIMMICKS =====================
const GIMMICKS = {};

// ---- COMBO GIMMICK FRAMEWORK ----
const STEPS = {};

function comboGimmick(ctx, stepFns) {
  const c=docCard(ctx.teammate); stageEl.appendChild(c);
  const area=el("div"); area.style.marginTop="8px"; c.appendChild(area);
  let sc=null, done=false;
  function runStep(i) {
    if(done) return;
    area.innerHTML="";
    if(sc){sc();sc=null;}
    const cleanup=stepFns[i](area,{
      onSuccess:()=>{ if(i+1<stepFns.length) runStep(i+1); else{done=true;ctx.onSuccess();} },
      onFail:(r)=>{ done=true; ctx.onFail(r); }
    });
    sc=cleanup||null;
  }
  runStep(0);
  return ()=>{ done=true; if(sc)sc(); };
}

function fixGimmick(ctx, sentenceParts){
  // sentenceParts: array of {text, fix:{wrong,options,correct}} where fix optional
  const c=docCard(ctx.teammate); stageEl.appendChild(c);
  c.querySelector(".doc-body").innerHTML="";
  const body=c.querySelector(".doc-body");
  const hint=el("div","hint","승인 요청 내용을 검토해주세요."); c.insertBefore(hint,body);
  let fixedAll=false; let toFix=0;
  sentenceParts.forEach(p=>{
    if(p.fix){ toFix++;
      const span=el("span","fixspan",p.fix.wrong);
      span.onclick=()=>{ showFixMenu(span,p.fix,()=>{ toFix--; if(toFix===0)fixedAll=true; }, ctx); };
      body.appendChild(span);
    } else { body.appendChild(document.createTextNode(p.text)); }
  });
  const row=el("div","row");
  const b=el("button","b green","동의합니다");
  b.onclick=()=>{ if(!fixedAll) ctx.onFail("문서를 먼저 올바르게 수정해야 합니다"); else ctx.onSuccess(); };
  row.appendChild(b); c.appendChild(row);
  return null;
}
function showFixMenu(span, fix, onCorrect, ctx){
  const ov=el("div","overlay"); const p=el("div","popup center");
  p.appendChild(el("div","doc-title","항목을 선택해주세요"));
  shuffle(fix.options).forEach(o=>{ const b=el("button","b gray",o); b.style.margin="4px";
    b.onclick=()=>{ if(o===fix.correct){ span.textContent=o; span.className=""; span.style.color="#27ae60"; span.style.fontWeight="bold"; ov.remove(); onCorrect(); }
      else ctx.onFail("잘못된 값을 선택했습니다"); };
    p.appendChild(b); });
  ov.appendChild(p); document.body.appendChild(ov);
}

GIMMICKS.forbidden_zones = ctx=>{
  const c=docCard(ctx.teammate,"문서 검토 절차를 완료해주세요."); stageEl.appendChild(c);
  const CW=360,CH=200; const cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:8px auto;cursor:pointer;border:1px solid #d4dbe5;border-radius:3px;background:#eef2f7;";
  c.appendChild(cv); const g=cv.getContext("2d");
  const BX=55,BR=11,GRAVITY=0.14,JUMP=-2.2,SPEED=1.5,GAP=90,PW=20;
  const WORLD=900;
  // 파이프: x(월드좌표), gapY(중앙)
  const pipes=[{x:240,gapY:100},{x:420,gapY:80},{x:600,gapY:120},{x:770,gapY:95}];
  const GOAL={wx:820,y:CH/2-22,w:48,h:44};
  let by=CH/2,vy=0,sx=0,started=false,done=false,raf=null;
  const jump=()=>{ if(done)return; if(!started)started=true; vy=JUMP; playSound('ui_click',0.3); };
  cv.addEventListener("click",jump);
  const kh=e=>{if(e.code==="Space"&&!e.repeat){e.preventDefault();jump();}};
  document.addEventListener("keydown",kh);
  function update(){
    if(!done){
      if(started){vy+=GRAVITY;by+=vy;sx+=SPEED;}
      // 천장/바닥
      if(by-BR<0||by+BR>CH){end(false);return;}
      // 파이프 충돌
      for(const p of pipes){
        const px=p.x-sx;
        if(px<BX+BR&&px+PW>BX-BR){
          if(by-BR<p.gapY-GAP/2||by+BR>p.gapY+GAP/2){end(false);return;}
        }
      }
      // 목표 도달
      const gx=GOAL.wx-sx;
      if(gx<BX+BR&&gx+GOAL.w>BX-BR&&by+BR>GOAL.y&&by-BR<GOAL.y+GOAL.h){end(true);return;}
      draw();
      raf=requestAnimationFrame(update);
    }
  }
  function draw(){
    g.clearRect(0,0,CW,CH);
    g.fillStyle="#eef2f7";g.fillRect(0,0,CW,CH);
    // 파이프
    pipes.forEach(p=>{
      const px=p.x-sx;
      if(px>-PW&&px<CW+PW){
        g.fillStyle="rgba(192,57,43,0.85)";
        g.fillRect(px,0,PW,p.gapY-GAP/2);
        g.fillRect(px,p.gapY+GAP/2,PW,CH-(p.gapY+GAP/2));
        g.fillStyle="#c0392b";g.fillRect(px-3,p.gapY-GAP/2-8,PW+6,8);
        g.fillRect(px-3,p.gapY+GAP/2,PW+6,8);
      }
    });
    // 목표
    const gx=GOAL.wx-sx;
    if(gx<CW+GOAL.w){
      g.fillStyle="rgba(39,174,96,0.15)";g.fillRect(gx,GOAL.y,GOAL.w,GOAL.h);
      g.strokeStyle="#27ae60";g.lineWidth=1.5;g.setLineDash([3,3]);g.strokeRect(gx,GOAL.y,GOAL.w,GOAL.h);g.setLineDash([]);
      g.fillStyle="#27ae60";g.font="bold 9px sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillText("결재함",gx+GOAL.w/2,GOAL.y+GOAL.h/2);
    }
    // 캐릭터(동의합니다 버튼 형태)
    g.fillStyle="#27ae60";g.beginPath();g.rect(BX-BR,by-9,BR*2,18);g.fill();
    g.fillStyle="#fff";g.font="bold 7px sans-serif";g.textAlign="center";g.textBaseline="middle";
    g.fillText("동의",BX,by-3);g.fillText("합니다",BX,by+6);
    // 안내
    if(!started){
      g.fillStyle="rgba(0,0,0,0.35)";g.fillRect(0,0,CW,CH);
      g.fillStyle="#fff";g.font="bold 13px sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillText("클릭 또는 스페이스바",CW/2,CH/2-10);g.font="11px sans-serif";
      g.fillText("결재함까지 통과하세요",CW/2,CH/2+12);
    }
  }
  function end(success){
    if(done)return;done=true;
    cancelAnimationFrame(raf);cv.removeEventListener("click",jump);document.removeEventListener("keydown",kh);
    if(success)ctx.onSuccess();else ctx.onFail("반려 처리");
  }
  draw();raf=requestAnimationFrame(update);
  return ()=>{done=true;cancelAnimationFrame(raf);cv.removeEventListener("click",jump);document.removeEventListener("keydown",kh);};
};

GIMMICKS.brick_approval = ctx => {
  const c = docCard(ctx.teammate, "승인 요청 내용을 검토해주세요."); stageEl.appendChild(c);
  const cv=document.createElement("canvas"); cv.width=380;cv.height=230;
  cv.style.cssText="display:block;border:1px solid #d4dbe5;border-radius:3px;margin-top:10px;cursor:none;background:#f0f4f9;";
  c.appendChild(cv);
  const g=cv.getContext("2d"),CW=380,CH=230,pW=110,pH=10,BR=6;
  let pX=CW/2-pW/2,bx=CW/2,by=CH-50,bdx=2.4,bdy=-2.8,done=false,raf=null;
  const COLS=5,ROWS=3,bkW=56,bkH=18,bkGap=5;
  const startX=(CW-(COLS*(bkW+bkGap)-bkGap))/2, startY=20;
  // Button hidden behind center bricks (rows 1-2, cols 1-3)
  const btnX=startX+(bkW+bkGap), btnY=startY+(bkH+bkGap);
  const btnW=3*bkW+2*bkGap, btnH=2*bkH+bkGap;
  const bricks=[];
  for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++){
    const isTarget=(r>=1&&r<=2&&col>=1&&col<=3);
    bricks.push({x:startX+col*(bkW+bkGap),y:startY+r*(bkH+bkGap),alive:true,isTarget});
  }
  const mmove=e=>{const r=cv.getBoundingClientRect();pX=Math.max(0,Math.min(CW-pW,e.clientX-r.left-pW/2));};
  document.addEventListener("mousemove",mmove);
  function tick(){
    bx+=bdx;by+=bdy;
    if(bx-BR<=0){bx=BR;bdx=Math.abs(bdx);}if(bx+BR>=CW){bx=CW-BR;bdx=-Math.abs(bdx);}
    if(by-BR<=0){by=BR;bdy=Math.abs(bdy);}
    if(by+BR>=CH-20&&bx>=pX&&bx<=pX+pW){by=CH-20-BR;bdy=-Math.abs(bdy);bdx=((bx-pX)/pW-0.5)*5;}
    if(by+BR>=CH){if(!done){done=true;ctx.onFail("처리 실패");}return;}
    for(const b of bricks){if(!b.alive)continue;if(bx+BR>b.x&&bx-BR<b.x+bkW&&by+BR>b.y&&by-BR<b.y+bkH){b.alive=false;bdy=-bdy;
      if(bricks.filter(bb=>bb.isTarget).every(bb=>!bb.alive)){done=true;ctx.onSuccess();}
      break;}}
  }
  function draw(){
    g.clearRect(0,0,CW,CH);
    // Draw hidden button (revealed as target bricks break)
    const revealed=bricks.filter(b=>b.isTarget).every(b=>!b.alive);
    g.fillStyle=revealed?"#27ae60":"#c8d6e8";
    g.fillRect(btnX,btnY,btnW,btnH);
    g.strokeStyle=revealed?"#1e8449":"#9aafc4";
    g.lineWidth=1;g.strokeRect(btnX,btnY,btnW,btnH);
    g.fillStyle=revealed?"#fff":"#8899aa";
    g.font="bold 14px 맑은 고딕,sans-serif";
    g.textAlign="center";g.textBaseline="middle";
    g.fillText("동의합니다",btnX+btnW/2,btnY+btnH/2);
    // Draw bricks
    bricks.forEach(b=>{if(!b.alive)return;
      g.fillStyle=b.isTarget?"#2ecc71":"#3d8bcd";
      g.fillRect(b.x,b.y,bkW,bkH);
      g.strokeStyle=b.isTarget?"#27ae60":"#2770a8";
      g.lineWidth=1;g.strokeRect(b.x,b.y,bkW,bkH);});
    g.fillStyle="#1e3a5f";g.fillRect(pX,CH-20,pW,pH);
    g.beginPath();g.arc(bx,by,BR,0,Math.PI*2);g.fillStyle="#c0392b";g.fill();
  }
  function loop(){if(done)return;tick();draw();raf=requestAnimationFrame(loop);}
  loop();
  return ()=>{done=true;if(raf)cancelAnimationFrame(raf);document.removeEventListener("mousemove",mmove);};
};

GIMMICKS.claw_approval = ctx => {
  const c = docCard(ctx.teammate, "승인 항목을 확인해주세요."); stageEl.appendChild(c);
  const cv=document.createElement("canvas");cv.width=380;cv.height=240;
  cv.style.cssText="display:block;border:1px solid #d4dbe5;border-radius:3px;margin-top:10px;cursor:crosshair;background:#eef2f7;";
  c.appendChild(cv);
  const g=cv.getContext("2d"),CW=380,CH=240;
  const options=shuffle([{label:"동의합니다",win:true},{label:"반대합니다",win:false},{label:"보류합니다",win:false},{label:"거부합니다",win:false}]);
  const bW=76,bH=30,bY=CH-55,spacing=CW/(options.length+1);
  options.forEach((b,i)=>{b.bx=spacing*(i+1)-bW/2;});
  const HOME=28;
  let clawX=CW/2,clawY=HOME,phase="idle",grabbed=null,done=false,raf=null;
  cv.onmousemove=e=>{if(phase!=="idle")return;const r=cv.getBoundingClientRect();clawX=Math.max(20,Math.min(CW-20,e.clientX-r.left));};
  cv.onclick=()=>{if(phase==="idle"&&!done)phase="drop";};
  function tick(){
    if(phase==="drop"){
      clawY=Math.min(bY,clawY+5);
      if(clawY>=bY){grabbed=options.find(b=>clawX>=b.bx&&clawX<=b.bx+bW)||null;phase="rise";}
    } else if(phase==="rise"){
      clawY=Math.max(HOME,clawY-4);
      if(clawY<=HOME){done=true;phase="done";cancelAnimationFrame(raf);
        setTimeout(()=>grabbed&&grabbed.win?ctx.onSuccess():ctx.onFail("잘못된 항목을 선택했습니다"),300);}
    }
  }
  function drawClaw(){
    g.beginPath();g.moveTo(clawX,HOME-8);g.lineTo(clawX,clawY-12);g.strokeStyle="#555";g.lineWidth=2;g.stroke();
    g.fillStyle="#1e3a5f";g.fillRect(clawX-18,HOME-18,36,12);
    g.beginPath();g.moveTo(clawX,clawY-12);g.lineTo(clawX-13,clawY);g.strokeStyle="#1e3a5f";g.lineWidth=3;g.stroke();
    g.beginPath();g.moveTo(clawX,clawY-12);g.lineTo(clawX+13,clawY);g.strokeStyle="#1e3a5f";g.lineWidth=3;g.stroke();
    if(grabbed&&phase==="rise"){
      g.fillStyle=grabbed.win?"#27ae60":"#dde3ec";g.fillRect(clawX-bW/2,clawY,bW,bH);
      g.fillStyle=grabbed.win?"#fff":"#444";g.font="bold 11px 맑은 고딕,sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillText(grabbed.label,clawX,clawY+bH/2);
    }
  }
  function draw(){
    g.clearRect(0,0,CW,CH);
    g.strokeStyle="#c0c8d4";g.lineWidth=2;g.strokeRect(4,4,CW-8,CH-8);
    g.beginPath();g.moveTo(12,HOME-8);g.lineTo(CW-12,HOME-8);g.strokeStyle="#9aa8b8";g.lineWidth=1;g.stroke();
    options.forEach(b=>{
      if(grabbed===b&&phase==="rise")return;

GIMMICKS.conveyor_approval = ctx => {
  const c = docCard(ctx.teammate, "전자결재 승인 항목을 확인해주세요."); stageEl.appendChild(c);
  const container=el("div"); container.style.cssText="position:relative;height:60px;border:1px solid #d4dbe5;border-radius:3px;overflow:hidden;background:#f9fbfc;margin-top:10px;";
  c.appendChild(container);
  const slotW=96;
  const slot=el("div"); slot.style.cssText="position:absolute;top:0;bottom:0;width:"+slotW+"px;border-left:2px solid #27ae60;border-right:2px solid #27ae60;background:rgba(39,174,96,.1);pointer-events:none;z-index:2;transition:left .05s;";
  container.appendChild(slot);
  const labels=["동의합니다","반대합니다","보류합니다","동의하지않습니다","검토합니다","거부합니다"];
  const bW=90,gap=28,totalW=(bW+gap)*labels.length;
  let offset=0,done=false,raf=null,tick=0;
  // slot moves: oscillates slowly across container
  let slotX=0; // left position of slot (set after container renders)
  const items=labels.map((label,i)=>{
    const b=el("button","b "+(label==="동의합니다"?"green":"gray"),label);
    b.style.cssText="position:absolute;top:50%;transform:translateY(-50%);width:"+bW+"px;height:30px;font-size:12px;padding:0;";
    container.appendChild(b);
    b.onclick=()=>{
      if(done)return;
      const bLeft=parseFloat(b.style.left)||0, bc=bLeft+bW/2, sc=slotX+slotW/2;
      if(Math.abs(bc-sc)>slotW*0.8){ctx.onFail("승인 슬롯 밖에서 클릭했습니다");return;}
      done=true;cancelAnimationFrame(raf);
      if(label==="동의합니다")ctx.onSuccess();else ctx.onFail("잘못된 항목을 선택했습니다");
    };
    return {b,label};
  });
  function loop(){
    if(done)return;
    tick++;
    // conveyor speed: ~5.5px/frame → ~330px/sec → button in slot ~(96/5.5)≈17 frames ≈280ms
    offset=(offset+1.375)%totalW;
    items.forEach((item,i)=>{let x=i*(bW+gap)-offset;if(x<-(bW+gap))x+=totalW;item.b.style.left=x+"px";});
    // slot oscillates: period ~3s (180 frames), range: 20px to (cw-slotW-20px)
    const cw=container.offsetWidth||400;
    const margin=20, range=cw-slotW-margin*2;
    slotX=margin+range/2+Math.sin(tick/270*Math.PI)*range/2;
    slot.style.left=slotX+"px";
    raf=requestAnimationFrame(loop);
  }
  loop();
  return ()=>{done=true;if(raf)cancelAnimationFrame(raf);};
};

  cv.addEventListener("mousedown",md);cv.addEventListener("mousemove",mm);cv.addEventListener("mouseup",mu);cv.addEventListener("click",ck);
  draw();
  function cleanup(){cv.removeEventListener("mousedown",md);cv.removeEventListener("mousemove",mm);cv.removeEventListener("mouseup",mu);cv.removeEventListener("click",ck);}
  return cleanup;
};

GIMMICKS.escape_approval = ctx=>{
  const c=docCard(ctx.teammate); stageEl.appendChild(c);
  const CW=370,CH=220,cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:8px auto;cursor:grab;background:#f8f9fb;";
  c.appendChild(cv); const g=cv.getContext("2d");
  const btn={x:18,y:92,w:92,h:36};
  const EXIT={x:278,y:90,w:72,h:40};
  const OBS=[
    {x:138,y:0,w:22,h:84,label:"반려",c:"#c0392b"},
    {x:138,y:128,w:22,h:92,label:"삭제",c:"#8e44ad"},
    {x:218,y:0,w:22,h:78,label:"보류",c:"#e67e22"},
    {x:218,y:130,w:22,h:90,label:"보류",c:"#e67e22"},
  ];
  let dragging=false,ox=0,oy=0,done=false;
  function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
  function draw(){
    g.clearRect(0,0,CW,CH);
    g.fillStyle="rgba(39,174,96,0.12)";g.fillRect(EXIT.x,EXIT.y,EXIT.w,EXIT.h);
    g.strokeStyle="#27ae60";g.lineWidth=2;g.setLineDash([5,3]);g.strokeRect(EXIT.x,EXIT.y,EXIT.w,EXIT.h);g.setLineDash([]);
    g.fillStyle="#27ae60";g.font="12px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText("결재함",EXIT.x+EXIT.w/2,EXIT.y+EXIT.h/2);
    OBS.forEach(o=>{g.fillStyle=o.c+"22";g.fillRect(o.x,o.y,o.w,o.h);g.strokeStyle=o.c;g.lineWidth=2;g.strokeRect(o.x,o.y,o.w,o.h);
      g.fillStyle=o.c;g.font="bold 9px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText(o.label,o.x+o.w/2,o.y+o.h/2);});
    g.fillStyle="#27ae60";g.fillRect(btn.x,btn.y,btn.w,btn.h);
    g.fillStyle="#fff";g.font="bold 11px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText("동의합니다",btn.x+btn.w/2,btn.y+btn.h/2);
  }
  const md=e=>{const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
    if(mx>btn.x&&mx<btn.x+btn.w&&my>btn.y&&my<btn.y+btn.h){dragging=true;ox=mx-btn.x;oy=my-btn.y;cv.style.cursor="grabbing";}};
  const mm=e=>{if(!dragging||done)return;const r=cv.getBoundingClientRect();
    const nx=Math.max(0,Math.min(CW-btn.w,e.clientX-r.left-ox));
    const ny=Math.max(0,Math.min(CH-btn.h,e.clientY-r.top-oy));
    btn.x=nx;btn.y=ny;
    for(const o of OBS){if(ov(btn,o)){done=true;cleanup();ctx.onFail("반려 처리");return;}}
    if(btn.x+btn.w>=EXIT.x+EXIT.w-8&&ov(btn,EXIT)){done=true;cleanup();ctx.onSuccess();return;}
    draw();};
  const mu=()=>{dragging=false;cv.style.cursor="grab";};
  cv.addEventListener("mousedown",md);cv.addEventListener("mousemove",mm);document.addEventListener("mouseup",mu);
  draw();
  function cleanup(){cv.removeEventListener("mousedown",md);cv.removeEventListener("mousemove",mm);document.removeEventListener("mouseup",mu);}
  return cleanup;
};

GIMMICKS.breakout_approval = ctx=>{
  const c=docCard(ctx.teammate,"결재 보류 항목을 검토 중입니다."); stageEl.appendChild(c);
  const CW=370,CH=240; const cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:8px auto;cursor:none;background:#f4f6f9;";
  c.appendChild(cv); const g=cv.getContext("2d");
  const PW=80,PH=8,BR=7;
  let px=CW/2-PW/2,bx=CW/2,by=CH-50,bdx=2.2,bdy=-2.8,done=false,raf=null,btnVis=false;
  const lbls=["보류","검토","재확인","첨부누락","권한확인","승인대기"];
  const bricks=[]; const BW=88,BH=22,COLS=3,ROWS=2,sx=(CW-(3*BW+2*10))/2;
  for(let r=0;r<ROWS;r++) for(let cc=0;cc<COLS;cc++) bricks.push({x:sx+cc*(BW+10),y:44+r*(BH+8),w:BW,h:BH,alive:true,lbl:lbls[r*COLS+cc]});
  const BTN={x:CW/2-55,y:CH/2-18,w:110,h:36};
  const mm=e=>{if(btnVis)return;const r=cv.getBoundingClientRect();px=Math.max(0,Math.min(CW-PW,e.clientX-r.left-PW/2));};
  cv.addEventListener("mousemove",mm);
  cv.onclick=e=>{if(!done&&btnVis){const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;if(mx>BTN.x&&mx<BTN.x+BTN.w&&my>BTN.y&&my<BTN.y+BTN.h){done=true;cleanup();ctx.onSuccess();}}};
  function draw(){
    g.clearRect(0,0,CW,CH);
    bricks.forEach(b=>{if(!b.alive)return;g.fillStyle="#dde3ec";g.fillRect(b.x,b.y,b.w,b.h);g.strokeStyle="#b0bac4";g.lineWidth=1;g.strokeRect(b.x,b.y,b.w,b.h);g.fillStyle="#445566";g.font="bold 10px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText(b.lbl,b.x+b.w/2,b.y+b.h/2);});
    if(btnVis){g.fillStyle="#27ae60";g.fillRect(BTN.x,BTN.y,BTN.w,BTN.h);g.fillStyle="#fff";g.font="bold 12px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText("동의합니다",BTN.x+BTN.w/2,BTN.y+BTN.h/2);}
    else{g.beginPath();g.arc(bx,by,BR,0,Math.PI*2);g.fillStyle="#1e3a5f";g.fill();}
    g.fillStyle="#1e3a5f";g.fillRect(px,CH-PH-6,PW,PH);
  }
  function loop(){
    if(done)return;
    bx+=bdx;by+=bdy;
    if(bx-BR<0){bx=BR;bdx=Math.abs(bdx);}if(bx+BR>CW){bx=CW-BR;bdx=-Math.abs(bdx);}
    if(by-BR<0){by=BR;bdy=Math.abs(bdy);}
    const py2=CH-PH-6;
    if(by+BR>=py2&&bdy>0&&bx>=px-4&&bx<=px+PW+4){bdy=-Math.abs(bdy);bdx=((bx-(px+PW/2))/(PW/2))*4;}
    if(by-BR>CH){done=true;cleanup();ctx.onFail("처리 실패");return;}
    bricks.forEach(b=>{
      if(!b.alive)return;
      if(bx+BR>b.x&&bx-BR<b.x+b.w&&by+BR>b.y&&by-BR<b.y+b.h){
        b.alive=false;
        const ot=by+BR-b.y,ob=b.y+b.h-(by-BR),ol=bx+BR-b.x,or2=b.x+b.w-(bx-BR);
        if(Math.min(ot,ob)<Math.min(ol,or2))bdy=-bdy;else bdx=-bdx;
      }
    });
    if(!btnVis&&bricks.every(b=>!b.alive)){btnVis=true;cv.style.cursor="pointer";cancelAnimationFrame(raf);draw();return;}
    draw();raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
  function cleanup(){cancelAnimationFrame(raf);cv.removeEventListener("mousemove",mm);}
  return cleanup;
};

function bossStage(ctx){

  // header
  const hdr=el("div","doc-card-hdr");
  hdr.appendChild(el("span","doc-card-name","전사공지 발송 확인"));

  preview.innerHTML=`<div style="border:1px solid #d4dbe5;border-radius:3px;background:#fafbfc;overflow:hidden;">
    <div style="background:#f0f4f8;border-bottom:1px solid #d4dbe5;padding:10px 16px;font-size:13px;font-weight:700;color:#1e3a5f;">📢 주 1회 재택근무 시행 안내</div>
    <div style="padding:10px 16px;font-size:12px;color:#555;border-bottom:1px solid #e8ecf0;">발송 대상: <span id="boss-target" class="fixspan">경영진만</span></div>
    <div style="padding:14px 16px;font-size:13px;color:#444;line-height:1.8;">안녕하세요. 구성원들의 업무 집중도와 효율적인 근무 환경을 위해 주 1회 재택근무를 다시 시행합니다.<br><br>시행일: 다음 주 수요일 / 대상: 전 구성원</div>
  </div>`;
  c.appendChild(preview);
  // action area
  const rev=el("div","doc-review-area"); rev.appendChild(el("div","doc-review-label","발송 검토")); c.appendChild(rev);
  const body=el("div"); body.innerHTML='<div class="hint" style="color:#b0b8c4;">발송 전 문서 내용을 확인해주세요.</div>'; rev.appendChild(body);
  let cleanupMove=null;

  $("boss-target").onclick=()=>showFixMenu(
    $("boss-target"),
    {wrong:"경영진만",options:["경영진만","전 구성원","일부 팀"],correct:"전 구성원"},
    ()=>step2(), ctx
  );

  function step2(){
    body.innerHTML="";
    const opts=shuffle(["임시저장","Send to All","팀장급 발송","발송 취소","전체 보관"]);
    const row=el("div","row"); row.style.flexWrap="wrap";
    opts.forEach(o=>{
      const b=el("button",o==="Send to All"?"b green":"b gray",o);
      b.onclick=()=>o==="Send to All"?(playSound('final_send'),step3()):ctx.onFail("잘못된 발송 버튼");
      row.appendChild(b);
    });
    body.appendChild(row);
  }

  function step3(){
    popup(ctx,"전사 발송을 취소하시겠습니까?",[
      {label:"취소한다",cls:"red",win:false,reason:"전사 발송을 취소했습니다"},
      {label:"취소하지 않는다",cls:"gray",win:true}]);
    document.querySelectorAll(".overlay button").forEach(b=>{
      if(b.textContent==="취소하지 않는다") b.onclick=()=>{document.querySelectorAll(".overlay").forEach(o=>o.remove());step4();};
    });
  }

  function step4(){
    body.innerHTML="";
    const area=el("div"); area.style.cssText="position:relative;height:160px;border:1px solid #d4dbe5;border-radius:3px;background:#f9fbfc;overflow:hidden;";
    body.appendChild(area);
    const s4ivs=[];
    function rnd4(b){ const aw=area.offsetWidth||340,ah=area.offsetHeight||160; b.style.left=Math.random()*(aw-(b.offsetWidth||100))+"px"; b.style.top=Math.random()*(ah-(b.offsetHeight||32))+"px"; }
    const btn=el("button","b green","📤 Send to All"); btn.style.cssText="position:absolute;font-size:12px;z-index:2;";
    area.appendChild(btn);
    setTimeout(()=>{ rnd4(btn); s4ivs.push(setInterval(()=>rnd4(btn),900)); },30);
    btn.onclick=()=>ctx.onSuccess();
    ["📤 발송 취소","📤 전송 안 함","📤 보류"].forEach((txt,i)=>{
      const db=el("button","b gray",txt); db.style.cssText="position:absolute;font-size:12px;";
      db.onclick=()=>ctx.onFail("잘못된 버튼을 눌렀습니다"); area.appendChild(db);
      setTimeout(()=>{ rnd4(db); s4ivs.push(setInterval(()=>rnd4(db),1100+i*200)); },i*300+50);
    });
    cleanupMove=()=>s4ivs.forEach(clearInterval);
  }

  return ()=>{if(cleanupMove)cleanupMove();};
}

// ===================== START / RUN =====================
function startRun(){
  clearStage();
  // 미니게임(캔버스 인터랙티브) 65%, 콤보번들(단순클릭묶음) 35%
  const MINI_SET=new Set(['conveyor_approval','running_button','brick_approval','falling_approval','whack_approval','claw_approval','catch_approval','tilt_approval','fold_approval','escape_approval','breakout_approval','forbidden_zones','assemble_approval','hanko_approval']);
  const allK=Object.keys(GIMMICKS).filter(k=>k!=='boss_send_to_all');
  const NEW_MINI=['tilt_approval','fold_approval','escape_approval','breakout_approval'].filter(k=>GIMMICKS[k]);
  const oldMiniPool=shuffle(allK.filter(k=>MINI_SET.has(k)&&!NEW_MINI.includes(k)));
  const comboPool=shuffle(allK.filter(k=>k.startsWith('combo_')));
  // 65% 미니: 신규4 + 구5 = 9스테이지
  // 35% 콤보번들: 5스테이지 (total=14)
  const miniN=Math.min(oldMiniPool.length,5);
  const comboN=Math.min(comboPool.length,5);
  const tagged=shuffle([...NEW_MINI.map(k=>({k,c:'m'})),...oldMiniPool.slice(0,miniN).map(k=>({k,c:'m'})),...comboPool.slice(0,comboN).map(k=>({k,c:'o'}))]);
  const result=[],pool=[...tagged];
  while(pool.length){const last=result.length?result[result.length-1].c:null;let i=pool.findIndex(x=>x.c!==last);if(i===-1)i=0;result.push(pool.splice(i,1)[0]);}
  state.order=result.map(x=>x.k);
  state.teammates=shuffle(NAMES);
  state.stage=1;
  loadStage();
}

}
