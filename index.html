<title>Send to All</title>
<script>
const SOUND_PATHS={ui_click:"./sounds/ui_click.wav",ui_hover:"./sounds/ui_hover.wav",stage_success:"./sounds/stage_success.wav",wrong_click:"./sounds/wrong_click.wav",stage_fail:"./sounds/stage_fail.wav",timer_warning:"./sounds/timer_warning.wav",popup_open:"./sounds/popup_open.wav",final_send:"./sounds/final_send.wav",game_clear:"./sounds/game_clear.wav",typing_key:"./sounds/typing_key.wav",stamp:"./sounds/stamp.wav",drag_drop:"./sounds/drag_drop.wav",file_select:"./sounds/file_select.wav",file_error:"./sounds/file_error.wav"};
let soundMuted=false,soundVolume=.42;const soundCache={};
function preloadSounds(){Object.keys(SOUND_PATHS).forEach(k=>{const a=new Audio(SOUND_PATHS[k]);a.preload="auto";a.volume=soundVolume;soundCache[k]=a;});}
function playSound(name,volume){if(soundMuted||!SOUND_PATHS[name])return;try{const base=soundCache[name]||new Audio(SOUND_PATHS[name]);soundCache[name]=base;const a=base.cloneNode(true);a.volume=typeof volume==="number"?volume:soundVolume;a.play().catch(()=>{});}catch(e){}}
document.addEventListener("click",()=>{preloadSounds();},{once:true});
</script>

<script>
const NAMES = ["박주현","황강수","최지혁","김철균","정승원","이성민","최귀현","김철웅","김인성","김용직","김성훈","김상은","표주영","조은비"];
const CORRECT = "동의합니다";
const $ = id => document.getElementById(id);
const stageEl = $("stage");
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function el(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function altName(n){ // 1 char difference
  const arr=[...n]; const i=Math.floor(Math.random()*arr.length);
  const pool="가나다라민준서현우진호영수철웅성은비주";
  let c; do{ c=pool[Math.floor(Math.random()*pool.length)]; }while(c===arr[i]);
  arr[i]=c; return arr.join("");
}

// ===== GAME STATE =====
let state = { stage:1, order:[], teammates:[], timer:90, tInt:null, cleanup:null, locked:false, usedWordOrder:false };

function showSidebar(on){
  const r=$("gw-right"), t=$("gw-timer-wrap"), h=$("hud-info");
  r.style.display=on?"flex":"none";
  t.style.display=on?"flex":"none";
  h.style.display=on?"flex":"none";
}
function updateSidebar(){
  const mate=state.teammates[(state.stage-1)%state.teammates.length]||"—";
  $("side-stage").textContent=state.stage+" / 15";
  $("side-name").textContent=mate;
  $("side-done").textContent=(state.stage-1)+" / 14";
  if($("side-stage-r"))$("side-stage-r").textContent=state.stage+" / 15";
  if($("side-name-r"))$("side-name-r").textContent=mate;
  if($("side-done-r"))$("side-done-r").textContent=(state.stage-1)+" / 14";
}
function clearStage(){
  if(state.tInt){ clearInterval(state.tInt); state.tInt=null; }
  if(state.cleanup){ try{state.cleanup();}catch(e){} state.cleanup=null; }
  stageEl.innerHTML="";
  document.querySelectorAll(".overlay").forEach(o=>o.remove());
  state.locked=false;
}

function startTimer(){
  state.timer=90; updateTimer(); let warnPlayed=false;
  state.tInt=setInterval(()=>{
    state.timer--; updateTimer();
    if(state.timer<=10&&!warnPlayed){warnPlayed=true;playSound('timer_warning');}
    if(state.timer<=0){ clearInterval(state.tInt); fail("시간 초과"); }
  },1000);
}
function updateTimer(){
  const t=$("timer"); t.textContent=state.timer;
  t.classList.toggle("warn", state.timer<=10);
  t.classList.toggle("warning", state.timer<=10);
}

function fail(reason){
  if(state.locked) return; state.locked=true; playSound('stage_fail');

function success(){
  if(state.locked) return; state.locked=true; playSound('stage_success');
  if(state.tInt) clearInterval(state.tInt);
  state.stage++;
  if(state.stage>15){ win(); return; }
  clearStage(); setTimeout(loadStage, 250);
}

  b.onclick=()=>startScreen(); inner.appendChild(b);

function loadStage(){
  clearStage();
  showSidebar(true);
  updateSidebar();
  $("progfill").style.width=((state.stage-1)/15*100)+"%";
  const teammate=state.teammates[(state.stage-1)%state.teammates.length];
  const prev=state.stage>1?state.teammates[(state.stage-2)%state.teammates.length]:teammate;
  const ctx={ teammate, prevTeammate:prev, container:stageEl,
    onSuccess:()=>{ $("progfill").style.width=(state.stage/15*100)+"%"; success(); },
    onFail:(r)=>{ playSound('wrong_click'); fail(r||"잘못된 동작"); } };
  startTimer();
  if(state.stage===15){ state.cleanup=bossStage(ctx); return; }
  const gk=state.order[state.stage-1];
  state.cleanup=GIMMICKS[gk](ctx);
}

// helper: standard doc header card
function docCard(teammate, bodyHTML){
  const c=el("div","card");
  // header
  const hdr=el("div","doc-card-hdr");
  hdr.appendChild(el("span","doc-card-name", teammate+"님의 재택근무 시행 동의서"));
  hdr.appendChild(el("span","doc-status-badge","동의 대기"));
  c.appendChild(hdr);
  // meta
  const meta=el("div","doc-meta");
  meta.innerHTML=`
    <div class="doc-meta-row"><span class="dm-label">문서번호</span><span class="dm-val">HR-2024-0519</span><span class="dm-label">기안자</span><span class="dm-val">인사팀</span></div>
    <div class="doc-meta-row"><span class="dm-label">기안일</span><span class="dm-val">2024.05.20 09:30</span><span class="dm-label">상태</span><span class="dm-val">동의 대기</span></div>`;
  c.appendChild(meta);
  // fixed doc info
  const infoWrap=el("div","doc-info-wrap");
  infoWrap.innerHTML=`<table class="doc-info-table">
    <tr><th>시행일</th><td>다음 주 수요일</td></tr>
    <tr><th>대상</th><td>전 구성원</td></tr>
    <tr><th>기준</th><td>팀별 업무 상황에 따라 요일 조율</td></tr>
  </table>`;
  c.appendChild(infoWrap);
  // gimmick review area
  const rev=el("div","doc-review-area");
  rev.appendChild(el("div","doc-review-label","검토 항목"));
  const b=el("div","doc-body"); b.innerHTML=bodyHTML||"주 1회 재택근무 시행에 동의하시겠습니까?";
  rev.appendChild(b);
  c.appendChild(rev);
  // proxy: gimmick calls c.appendChild/insertBefore → redirected into rev
  const _oa=c.appendChild.bind(c), _oi=c.insertBefore.bind(c);
  c.appendChild=(child)=>{
    if(child===hdr||child===meta||child===infoWrap||child===rev)return _oa(child);
    return rev.appendChild(child);
  };
  c.insertBefore=(child,ref)=>{
    if(ref&&ref.parentNode===rev)return rev.insertBefore(child,ref);
    return _oi(child,ref);
  };
  return c;
}

function comboGimmick(ctx, stepFns) {
  const c=docCard(ctx.teammate); stageEl.appendChild(c);
  const area=el("div"); area.style.marginTop="8px"; c.appendChild(area);
  let sc=null, done=false;
  function runStep(i) {
    if(done) return;
    area.innerHTML="";
    if(sc){sc();sc=null;}
    const cleanup=stepFns[i](area,{
      onSuccess:()=>{ if(i+1<stepFns.length) runStep(i+1); else{done=true;ctx.onSuccess();} },
      onFail:(r)=>{ done=true; ctx.onFail(r); }
    });
    sc=cleanup||null;
  }
  runStep(0);
  return ()=>{ done=true; if(sc)sc(); };
}

GIMMICKS.reverse_scroll = ctx=>{
  const c=docCard(ctx.teammate,"첨부 문서를 확인해주세요."); stageEl.appendChild(c);
  const box=el("div","scrollbox");
  for(let i=0;i<40;i++) box.appendChild(el("div",null,"제 "+(i+1)+"조. 재택근무 규정."));
  c.appendChild(box);
  const b=el("button","b disabled","동의합니다"); b.disabled=true;
  c.appendChild(document.createElement("br")); c.appendChild(b);
  const handler=(e)=>{ e.preventDefault(); box.scrollTop -= e.deltaY; };
  box.addEventListener("wheel",handler,{passive:false});
  // 방해요소 1: 주기적으로 스크롤 위로 당김
  const pullIv=setInterval(()=>{
    if(b.disabled) box.scrollTop=Math.max(0,box.scrollTop-box.clientHeight*0.25);
  },2800);
  // 방해요소 2: 중간에 시스템 팝업 알림 오버레이
  let popShown=false;
  const popIv=setInterval(()=>{
    if(popShown||!b.disabled) return;
    const progress=box.scrollTop/(box.scrollHeight-box.clientHeight);
    if(progress>0.4&&progress<0.9){
      popShown=true;
      const nt=el("div"); nt.style.cssText="position:absolute;top:0;left:0;right:0;background:#fff3cd;border-bottom:1px solid #ffc107;padding:8px 14px;font-size:12px;color:#856404;display:flex;justify-content:space-between;align-items:center;z-index:10;";
      nt.innerHTML="<span>⚠ 세션이 곧 만료됩니다. 계속하시겠습니까?</span>";
      const ok=el("button","b gray small","확인"); ok.style.cssText+="padding:2px 10px;font-size:11px;";
      ok.onclick=()=>{nt.remove();};
      nt.appendChild(ok); c.style.position="relative"; c.appendChild(nt);
    }
  },500);
  box.onscroll=()=>{ if(box.scrollTop+box.clientHeight>=box.scrollHeight-4){ b.disabled=false; b.className="b green"; clearInterval(pullIv); clearInterval(popIv); } };
  b.onclick=()=>{ if(!b.disabled)ctx.onSuccess(); };
  return ()=>{box.removeEventListener("wheel",handler);clearInterval(pullIv);clearInterval(popIv);};
};

      if(started){vy+=GRAVITY;by+=vy;sx+=SPEED;}
      // 천장/바닥
      if(by-BR<0||by+BR>CH){end(false);return;}
      // 파이프 충돌
      for(const p of pipes){
        const px=p.x-sx;
        if(px<BX+BR&&px+PW>BX-BR){
          if(by-BR<p.gapY-GAP/2||by+BR>p.gapY+GAP/2){end(false);return;}
        }
      }
      // 목표 도달
      const gx=GOAL.wx-sx;
      if(gx<BX+BR&&gx+GOAL.w>BX-BR&&by+BR>GOAL.y&&by-BR<GOAL.y+GOAL.h){end(true);return;}
      draw();
      raf=requestAnimationFrame(update);
    }
  }
  function draw(){
    g.clearRect(0,0,CW,CH);
    g.fillStyle="#eef2f7";g.fillRect(0,0,CW,CH);
    // 파이프
    pipes.forEach(p=>{
      const px=p.x-sx;
      if(px>-PW&&px<CW+PW){
        g.fillStyle="rgba(192,57,43,0.85)";
        g.fillRect(px,0,PW,p.gapY-GAP/2);
        g.fillRect(px,p.gapY+GAP/2,PW,CH-(p.gapY+GAP/2));
        g.fillStyle="#c0392b";g.fillRect(px-3,p.gapY-GAP/2-8,PW+6,8);
        g.fillRect(px-3,p.gapY+GAP/2,PW+6,8);
      }
    });
    // 목표
    const gx=GOAL.wx-sx;
    if(gx<CW+GOAL.w){
      g.fillStyle="rgba(39,174,96,0.15)";g.fillRect(gx,GOAL.y,GOAL.w,GOAL.h);
      g.strokeStyle="#27ae60";g.lineWidth=1.5;g.setLineDash([3,3]);g.strokeRect(gx,GOAL.y,GOAL.w,GOAL.h);g.setLineDash([]);
      g.fillStyle="#27ae60";g.font="bold 9px sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillText("결재함",gx+GOAL.w/2,GOAL.y+GOAL.h/2);
    }
    // 캐릭터(동의합니다 버튼 형태)
    g.fillStyle="#27ae60";g.beginPath();g.rect(BX-BR,by-9,BR*2,18);g.fill();
    g.fillStyle="#fff";g.font="bold 7px sans-serif";g.textAlign="center";g.textBaseline="middle";
    g.fillText("동의",BX,by-3);g.fillText("합니다",BX,by+6);
    // 안내
    if(!started){
      g.fillStyle="rgba(0,0,0,0.35)";g.fillRect(0,0,CW,CH);
      g.fillStyle="#fff";g.font="bold 13px sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillText("클릭 또는 스페이스바",CW/2,CH/2-10);g.font="11px sans-serif";
      g.fillText("결재함까지 통과하세요",CW/2,CH/2+12);
    }
  }
  function end(success){
    if(done)return;done=true;
    cancelAnimationFrame(raf);cv.removeEventListener("click",jump);document.removeEventListener("keydown",kh);
    if(success)ctx.onSuccess();else ctx.onFail("반려 처리");
  }
  draw();raf=requestAnimationFrame(update);
  return ()=>{done=true;cancelAnimationFrame(raf);cv.removeEventListener("click",jump);document.removeEventListener("keydown",kh);};
};

GIMMICKS.brick_approval = ctx => {
  const c = docCard(ctx.teammate, "승인 요청 내용을 검토해주세요."); stageEl.appendChild(c);
  const cv=document.createElement("canvas"); cv.width=380;cv.height=230;
  cv.style.cssText="display:block;border:1px solid #d4dbe5;border-radius:3px;margin-top:10px;cursor:none;background:#f0f4f9;";
  c.appendChild(cv);
  const g=cv.getContext("2d"),CW=380,CH=230,pW=110,pH=10,BR=6;
  let pX=CW/2-pW/2,bx=CW/2,by=CH-50,bdx=2.4,bdy=-2.8,done=false,raf=null;
  const COLS=5,ROWS=3,bkW=56,bkH=18,bkGap=5;
  const startX=(CW-(COLS*(bkW+bkGap)-bkGap))/2, startY=20;
  // Button hidden behind center bricks (rows 1-2, cols 1-3)
  const btnX=startX+(bkW+bkGap), btnY=startY+(bkH+bkGap);
  const btnW=3*bkW+2*bkGap, btnH=2*bkH+bkGap;
  const bricks=[];
  for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++){
    const isTarget=(r>=1&&r<=2&&col>=1&&col<=3);
    bricks.push({x:startX+col*(bkW+bkGap),y:startY+r*(bkH+bkGap),alive:true,isTarget});
  }
  const mmove=e=>{const r=cv.getBoundingClientRect();pX=Math.max(0,Math.min(CW-pW,e.clientX-r.left-pW/2));};
  document.addEventListener("mousemove",mmove);
  function tick(){
    bx+=bdx;by+=bdy;
    if(bx-BR<=0){bx=BR;bdx=Math.abs(bdx);}if(bx+BR>=CW){bx=CW-BR;bdx=-Math.abs(bdx);}
    if(by-BR<=0){by=BR;bdy=Math.abs(bdy);}
    if(by+BR>=CH-20&&bx>=pX&&bx<=pX+pW){by=CH-20-BR;bdy=-Math.abs(bdy);bdx=((bx-pX)/pW-0.5)*5;}
    if(by+BR>=CH){if(!done){done=true;ctx.onFail("처리 실패");}return;}
    for(const b of bricks){if(!b.alive)continue;if(bx+BR>b.x&&bx-BR<b.x+bkW&&by+BR>b.y&&by-BR<b.y+bkH){b.alive=false;bdy=-bdy;
      if(bricks.filter(bb=>bb.isTarget).every(bb=>!bb.alive)){done=true;ctx.onSuccess();}
      break;}}
  }
  function draw(){
    g.clearRect(0,0,CW,CH);
    // Draw hidden button (revealed as target bricks break)
    const revealed=bricks.filter(b=>b.isTarget).every(b=>!b.alive);
    g.fillStyle=revealed?"#27ae60":"#c8d6e8";
    g.fillRect(btnX,btnY,btnW,btnH);
    g.strokeStyle=revealed?"#1e8449":"#9aafc4";
    g.lineWidth=1;g.strokeRect(btnX,btnY,btnW,btnH);
    g.fillStyle=revealed?"#fff":"#8899aa";
    g.font="bold 14px 맑은 고딕,sans-serif";
    g.textAlign="center";g.textBaseline="middle";
    g.fillText("동의합니다",btnX+btnW/2,btnY+btnH/2);
    // Draw bricks
    bricks.forEach(b=>{if(!b.alive)return;
      g.fillStyle=b.isTarget?"#2ecc71":"#3d8bcd";
      g.fillRect(b.x,b.y,bkW,bkH);
      g.strokeStyle=b.isTarget?"#27ae60":"#2770a8";
      g.lineWidth=1;g.strokeRect(b.x,b.y,bkW,bkH);});
    g.fillStyle="#1e3a5f";g.fillRect(pX,CH-20,pW,pH);
    g.beginPath();g.arc(bx,by,BR,0,Math.PI*2);g.fillStyle="#c0392b";g.fill();
  }
  function loop(){if(done)return;tick();draw();raf=requestAnimationFrame(loop);}
  loop();
  return ()=>{done=true;if(raf)cancelAnimationFrame(raf);document.removeEventListener("mousemove",mmove);};
};


GIMMICKS.conveyor_approval = ctx => {
  const c = docCard(ctx.teammate, "전자결재 승인 항목을 확인해주세요."); stageEl.appendChild(c);
  const container=el("div"); container.style.cssText="position:relative;height:60px;border:1px solid #d4dbe5;border-radius:3px;overflow:hidden;background:#f9fbfc;margin-top:10px;";
  c.appendChild(container);
  const slotW=96;
  const slot=el("div"); slot.style.cssText="position:absolute;top:0;bottom:0;width:"+slotW+"px;border-left:2px solid #27ae60;border-right:2px solid #27ae60;background:rgba(39,174,96,.1);pointer-events:none;z-index:2;transition:left .05s;";
  container.appendChild(slot);
  const labels=["동의합니다","반대합니다","보류합니다","동의하지않습니다","검토합니다","거부합니다"];
  const bW=90,gap=28,totalW=(bW+gap)*labels.length;
  let offset=0,done=false,raf=null,tick=0;
  // slot moves: oscillates slowly across container
  let slotX=0; // left position of slot (set after container renders)
  const items=labels.map((label,i)=>{
    const b=el("button","b "+(label==="동의합니다"?"green":"gray"),label);
    b.style.cssText="position:absolute;top:50%;transform:translateY(-50%);width:"+bW+"px;height:30px;font-size:12px;padding:0;";
    container.appendChild(b);
    b.onclick=()=>{
      if(done)return;
      const bLeft=parseFloat(b.style.left)||0, bc=bLeft+bW/2, sc=slotX+slotW/2;
      if(Math.abs(bc-sc)>slotW*0.8){ctx.onFail("승인 슬롯 밖에서 클릭했습니다");return;}
      done=true;cancelAnimationFrame(raf);
      if(label==="동의합니다")ctx.onSuccess();else ctx.onFail("잘못된 항목을 선택했습니다");
    };
    return {b,label};
  });
  function loop(){
    if(done)return;
    tick++;
    // conveyor speed: ~5.5px/frame → ~330px/sec → button in slot ~(96/5.5)≈17 frames ≈280ms
    offset=(offset+1.375)%totalW;
    items.forEach((item,i)=>{let x=i*(bW+gap)-offset;if(x<-(bW+gap))x+=totalW;item.b.style.left=x+"px";});
    // slot oscillates: period ~3s (180 frames), range: 20px to (cw-slotW-20px)
    const cw=container.offsetWidth||400;
    const margin=20, range=cw-slotW-margin*2;
    slotX=margin+range/2+Math.sin(tick/270*Math.PI)*range/2;
    slot.style.left=slotX+"px";
    raf=requestAnimationFrame(loop);
  }
  loop();
  return ()=>{done=true;if(raf)cancelAnimationFrame(raf);};
};

  // Grid of cells displayed as two side-by-side tables
  const FIELDS=["기안자","결재자","시행일","대상","부서","결재구분","제목","비고","기준","분류"];
  const VALUES={
    "기안자":["김민준","이서연","박지호","최수아","정다은"],
    "결재자":["부서장","팀장","본부장","임원","대표이사"],
    "시행일":["2024.06.03","2024.07.01","2024.05.20","2024.08.12","2024.09.02"],
    "대상":["전 구성원","일부 구성원","신입사원","정규직","계약직"],
    "부서":["경영지원팀","인사팀","총무팀","기획팀","운영팀"],
    "결재구분":["전자결재","서면결재","긴급결재","일반결재","협조결재"],
    "제목":["재택근무 시행안","재택근무 폐지안","원격근무 운영안","재택근무 연장안","근무제도 개편안"],
    "비고":["없음","첨부파일 참조","별도 공지 예정","추후 안내","팀장 재량"],
    "기준":["팀별 업무 상황","개인 신청 기준","부서장 승인","격주 순환","월 1회"],
    "분류":["복리후생","인사규정","업무지침","내부결재","운영정책"]
  };

  const usedFields=shuffle(FIELDS).slice(0,6);
  // Build base row values
  const baseData=usedFields.map(f=>({f,v:VALUES[f][Math.floor(Math.random()*VALUES[f].length)]}));

  // Pick 3 random rows to differ
  const diffIdxs=shuffle([0,1,2,3,4,5]).slice(0,3);
  const diffs=new Set(diffIdxs);
  let found=0,done=false;

  const wrap=el("div"); wrap.style.cssText="display:flex;gap:8px;margin-top:8px;font-size:12px;";

  function makeTable(isRight){
    const tbl=document.createElement("table");
    tbl.style.cssText="border-collapse:collapse;flex:1;";
    baseData.forEach((row,i)=>{
      let val=row.v;
      if(isRight&&diffs.has(i)){
        // pick different value
        const opts=VALUES[row.f].filter(v=>v!==row.v);
        val=opts[Math.floor(Math.random()*opts.length)];
      }
      const tr=document.createElement("tr");
      const th=document.createElement("th");
      th.style.cssText="background:#f0f0f0;border:1px solid #ccc;padding:3px 6px;text-align:left;color:#445;font-weight:normal;white-space:nowrap;";

      td.style.cssText="border:1px solid #ccc;padding:3px 8px;background:#fff;cursor:"+(isRight?"pointer":"default")+";";
      td.textContent=val;
      if(isRight){
        td.dataset.idx=i;
        td.dataset.isDiff=diffs.has(i)?"1":"0";
        td.onclick=()=>{
          if(done)return;
          if(td.dataset.isDiff==="1"&&!td.dataset.marked){
            td.dataset.marked="1";
            td.style.background="#fff3cd";
            td.style.outline="2px solid #e67e22";
            found++;
            if(found===3){done=true;setTimeout(()=>ctx.onSuccess(),300);}
          } else if(!td.dataset.marked){
            done=true; ctx.onFail("오답");
          }
        };
      }
      tr.append(th,td); tbl.appendChild(tr);
    });
    return tbl;
  }

  const lblL=el("div"); lblL.style.cssText="text-align:center;font-size:11px;color:#666;margin-bottom:2px;"; lblL.textContent="원본";
  const lblR=el("div"); lblR.style.cssText="text-align:center;font-size:11px;color:#666;margin-bottom:2px;"; lblR.textContent="수신본";
  const colL=el("div"); colL.style.flex="1"; colL.append(lblL,makeTable(false));
  const colR=el("div"); colR.style.flex="1"; colR.append(lblR,makeTable(true));

  c.appendChild(wrap);
  return null;
};

GIMMICKS.whack_approval = ctx => {

  for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++) holes.push({x:PX+col*(HW+PX),y:PY+r*(HH+PY),label:null,ttl:0});

  const CW=360,CH=210,CX=180,CY=95;
  const cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:8px auto;cursor:default;border:1px solid #ddd;background:#f8f9fa;";
  c.appendChild(cv);
  const g=cv.getContext("2d");

  const BW=160,BH=120;
  let angle=0,dragging=false,startA=0,startMA=0;
  let fallen=false,btnX=CX,btnY=CY,btnVy=0,btnLanded=false,btnRect=null;
  let done=false,raf=null;

  function getCorner(){
    const r=angle*Math.PI/180;
    return {x:CX+Math.cos(r)*(BW/2)-Math.sin(r)*(BH/2), y:CY+Math.sin(r)*(BW/2)+Math.cos(r)*(BH/2)};
  }
  function mAngle(e){const r=cv.getBoundingClientRect();return Math.atan2(e.clientY-r.top-CY,e.clientX-r.left-CX)*180/Math.PI;}

  cv.addEventListener("mousemove",e=>{
    const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
    if(btnLanded&&btnRect&&mx>btnRect.x&&mx<btnRect.x+btnRect.w&&my>btnRect.y&&my<btnRect.y+btnRect.h){cv.style.cursor="pointer";return;}
    const cp=getCorner();const near=Math.hypot(mx-cp.x,my-cp.y)<16;
    cv.style.cursor=dragging?"grabbing":near?"grab":"default";
    if(dragging){
      let na=startA+(mAngle(e)-startMA);
      angle=Math.max(-75,Math.min(75,na));
      if(!fallen&&angle>42){fallen=true;btnX=CX;btnY=CY;btnVy=0;}
    }
  });
  cv.addEventListener("mousedown",e=>{
    const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
    if(btnLanded&&btnRect&&mx>btnRect.x&&mx<btnRect.x+btnRect.w&&my>btnRect.y&&my<btnRect.y+btnRect.h){
      if(!done){done=true;cancelAnimationFrame(raf);cleanup();ctx.onSuccess();}return;
    }
    const cp=getCorner();
    if(Math.hypot(mx-cp.x,my-cp.y)<16){dragging=true;startA=angle;startMA=mAngle(e);}
  });
  const onUp=()=>{dragging=false;};
  document.addEventListener("mouseup",onUp);

  function drawRotArrow(x,y){
    g.save();g.translate(x,y);
    g.beginPath();g.arc(0,0,7,0.3,Math.PI*1.7);g.strokeStyle="#fff";g.lineWidth=2;g.stroke();
    // arrowhead
    const ex=7*Math.cos(Math.PI*1.7),ey=7*Math.sin(Math.PI*1.7);
    g.beginPath();g.moveTo(ex,ey);g.lineTo(ex+3,ey-4);g.lineTo(ex-2,ey-3);g.closePath();g.fillStyle="#fff";g.fill();
    g.restore();
  }

  function draw(){
    g.clearRect(0,0,CW,CH);
    g.save();g.translate(CX,CY);g.rotate(angle*Math.PI/180);
    // Box
    g.fillStyle="#edf2f7";g.fillRect(-BW/2,-BH/2,BW,BH);
    g.strokeStyle="#2c3e50";g.lineWidth=2.5;g.strokeRect(-BW/2,-BH/2,BW,BH);
    // Corner dot
    g.fillStyle="#2c3e50";g.beginPath();g.arc(BW/2,BH/2,10,0,Math.PI*2);g.fill();
    drawRotArrow(BW/2,BH/2);
    g.restore();

    if(fallen){
      if(!btnLanded){btnVy+=0.6;btnY+=btnVy;if(btnY>=CH-18){btnY=CH-18;btnLanded=true;}}
      const bw=90,bh=26;
      btnRect={x:btnX-bw/2,y:btnY-bh/2,w:bw,h:bh};
      g.fillStyle="#27ae60";g.fillRect(btnRect.x,btnRect.y,btnRect.w,btnRect.h);
      g.strokeStyle="#1e8449";g.lineWidth=1;g.strokeRect(btnRect.x,btnRect.y,btnRect.w,btnRect.h);
      g.fillStyle="#fff";g.font="bold 12px 맑은 고딕,sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillText("동의합니다",btnX,btnY);
    }
  }

  function loop(){if(done)return;draw();raf=requestAnimationFrame(loop);}
  raf=requestAnimationFrame(loop);
  function cleanup(){if(raf)cancelAnimationFrame(raf);document.removeEventListener("mouseup",onUp);}
  return cleanup;
};

GIMMICKS.tilt_approval = ctx=>{
  const c=docCard(ctx.teammate); stageEl.appendChild(c);
  const CW=370,CH=180,cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:8px auto;cursor:ew-resize;background:#f8f9fa;";
  c.appendChild(cv); const g=cv.getContext("2d");
  let angle=0,bx=60,vx=0,done=false,raf=null,holdT=0;
  const TARGET={x:155,y:60,w:70,h:55},FAIL_L={x:5,y:60,w:60,h:55},FAIL_R={x:305,y:60,w:58,h:55};
  const by=88;
  const mm=e=>{const r=cv.getBoundingClientRect();angle=(e.clientX-r.left)/CW*1.0-0.5;};
  cv.addEventListener("mousemove",mm);
  function draw(){
    g.clearRect(0,0,CW,CH);
    [[FAIL_L,"반려"],[FAIL_R,"반려"]].forEach(([z,lbl])=>{
      g.fillStyle="rgba(192,57,43,0.15)";g.fillRect(z.x,z.y,z.w,z.h);
      g.strokeStyle="#c0392b";g.lineWidth=1.5;g.strokeRect(z.x,z.y,z.w,z.h);
      g.fillStyle="#c0392b";g.font="11px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText(lbl,z.x+z.w/2,z.y+z.h/2);
    });
    const prog=Math.min(holdT/45,1);
    g.fillStyle=`rgba(39,174,96,${0.1+prog*0.3})`;g.fillRect(TARGET.x,TARGET.y,TARGET.w,TARGET.h);
    g.strokeStyle="#27ae60";g.lineWidth=1.5;g.strokeRect(TARGET.x,TARGET.y,TARGET.w,TARGET.h);
    g.fillStyle="#27ae60";g.font="11px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText("결재함",TARGET.x+TARGET.w/2,TARGET.y+TARGET.h/2);
    if(prog>0){g.fillStyle="rgba(39,174,96,0.6)";g.fillRect(TARGET.x+2,TARGET.y+TARGET.h-6,prog*(TARGET.w-4),4);}
    g.save();g.translate(185,148);g.rotate(angle);g.fillStyle="#c8d4de";g.fillRect(-170,-5,340,10);g.restore();
    g.beginPath();g.arc(bx,by,20,0,Math.PI*2);g.fillStyle="#27ae60";g.fill();
    g.fillStyle="#fff";g.font="bold 7px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText("동의합니다",bx,by);
  }
  function inZone(z){return bx>z.x+18&&bx<z.x+z.w-18&&by>z.y&&by<z.y+z.h;}
  function loop(){
    if(done)return;
    vx+=Math.sin(angle)*0.45;vx*=0.96;bx+=vx;
    if(bx<20){bx=20;vx*=-0.5;}if(bx>CW-20){bx=CW-20;vx*=-0.5;}
    if(inZone(FAIL_L)||inZone(FAIL_R)){done=true;cleanup();ctx.onFail("반려 영역");return;}
    if(inZone(TARGET)){holdT++;if(holdT>=45){done=true;cleanup();ctx.onSuccess();return;}}else{holdT=Math.max(0,holdT-2);}
    draw();raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
  function cleanup(){cancelAnimationFrame(raf);cv.removeEventListener("mousemove",mm);}
  return cleanup;
};

GIMMICKS.fold_approval = ctx=>{

  const revealed=()=>foldX>BTN.x+BTN.w-18;

  }
  const md=e=>{const r=cv.getBoundingClientRect();const mx=e.clientX-r.left;if(Math.abs(mx-foldX)<20){dragging=true;offX=mx-foldX;cv.style.cursor="ew-resize";}};
  const mm=e=>{if(!dragging||done)return;const r=cv.getBoundingClientRect();foldX=Math.max(100,Math.min(CW-20,e.clientX-r.left-offX));draw();};
  const mu=()=>{dragging=false;cv.style.cursor="default";};
  const ck=e=>{if(done)return;const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
    if(revealed()&&mx>BTN.x&&mx<BTN.x+BTN.w&&my>BTN.y&&my<BTN.y+BTN.h){done=true;cleanup();ctx.onSuccess();}

  cv.addEventListener("mousedown",md);cv.addEventListener("mousemove",mm);cv.addEventListener("mouseup",mu);cv.addEventListener("click",ck);

};

GIMMICKS.escape_approval = ctx=>{
  const c=docCard(ctx.teammate); stageEl.appendChild(c);
  const CW=370,CH=220,cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:8px auto;cursor:grab;background:#f8f9fb;";
  c.appendChild(cv); const g=cv.getContext("2d");
  const btn={x:18,y:92,w:92,h:36};
  const EXIT={x:278,y:90,w:72,h:40};
  const OBS=[
    {x:138,y:0,w:22,h:84,label:"반려",c:"#c0392b"},
    {x:138,y:128,w:22,h:92,label:"삭제",c:"#8e44ad"},
    {x:218,y:0,w:22,h:78,label:"보류",c:"#e67e22"},
    {x:218,y:130,w:22,h:90,label:"보류",c:"#e67e22"},
  ];
  let dragging=false,ox=0,oy=0,done=false;
  function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
  function draw(){
    g.clearRect(0,0,CW,CH);
    g.fillStyle="rgba(39,174,96,0.12)";g.fillRect(EXIT.x,EXIT.y,EXIT.w,EXIT.h);

    OBS.forEach(o=>{g.fillStyle=o.c+"22";g.fillRect(o.x,o.y,o.w,o.h);g.strokeStyle=o.c;g.lineWidth=2;g.strokeRect(o.x,o.y,o.w,o.h);
      g.fillStyle=o.c;g.font="bold 9px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText(o.label,o.x+o.w/2,o.y+o.h/2);});
    g.fillStyle="#27ae60";g.fillRect(btn.x,btn.y,btn.w,btn.h);
    g.fillStyle="#fff";g.font="bold 11px sans-serif";g.textAlign="center";g.textBaseline="middle";g.fillText("동의합니다",btn.x+btn.w/2,btn.y+btn.h/2);
  }
  const md=e=>{const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
    if(mx>btn.x&&mx<btn.x+btn.w&&my>btn.y&&my<btn.y+btn.h){dragging=true;ox=mx-btn.x;oy=my-btn.y;cv.style.cursor="grabbing";}};
  const mm=e=>{if(!dragging||done)return;const r=cv.getBoundingClientRect();
    const nx=Math.max(0,Math.min(CW-btn.w,e.clientX-r.left-ox));
    const ny=Math.max(0,Math.min(CH-btn.h,e.clientY-r.top-oy));

  cv.addEventListener("mousedown",md);cv.addEventListener("mousemove",mm);document.addEventListener("mouseup",mu);

};

GIMMICKS.excel_approval = ctx=>{

  const COLS=9, ROWS=28;
  const colLabels=["A","B","C","D","E","F","G","H","I"];
  const categories=["교통비","숙박비","식대","회의비","소모품","접대비","출장비","통신비","교육비","복리후생"];
  const depts=["인사팀","총무팀","기획팀","영업팀","운영팀","IT팀","법무팀","재무팀"];
  const statuses=["정산완료","검토중","보류","미제출","승인대기","반려","확인요청","처리중"];
  const names=["김민준","이서연","박지호","최수아","정다은","홍길동","강태양","윤하늘","임지수","오세훈"];

  function randDate(){return `2024.${String(Math.floor(Math.random()*12)+1).padStart(2,"0")}.${String(Math.floor(Math.random()*28)+1).padStart(2,"0")}`;}
  function randAmt(){return (Math.floor(Math.random()*90+1)*1000).toLocaleString()+"원";}
  function randCell(r,col){
    const v=(r+col)%7;
    if(v===0)return categories[Math.floor(Math.random()*categories.length)];
    if(v===1)return randAmt();
    if(v===2)return depts[Math.floor(Math.random()*depts.length)];
    if(v===3)return names[Math.floor(Math.random()*names.length)];
    if(v===4)return randDate();
    if(v===5)return statuses[Math.floor(Math.random()*statuses.length)];
    return String(Math.floor(Math.random()*999)+1);
  }

  // Place 동의합니다 in a random cell (avoid row 0 = header)

  const targetC=Math.floor(Math.random()*COLS);

  // Outer container styled like Excel
  const sheet=el("div");
  sheet.style.cssText="overflow:auto;max-height:220px;margin-top:8px;border:2px solid #888;font-family:맑은 고딕,Malgun Gothic,sans-serif;font-size:11px;cursor:cell;";

  tbl.style.cssText="border-collapse:collapse;background:#fff;white-space:nowrap;";

  // Header row (Excel column labels)
  const thead=document.createElement("tr");
  // Row number corner
  const corner=document.createElement("th");
  corner.style.cssText="width:28px;min-width:28px;background:#e8e8e8;border:1px solid #bbb;text-align:center;position:sticky;top:0;left:0;z-index:3;";
  thead.appendChild(corner);
  colLabels.forEach(lbl=>{
    const th=document.createElement("th");
    th.style.cssText="min-width:80px;background:#e8e8e8;border:1px solid #bbb;text-align:center;padding:2px 4px;position:sticky;top:0;z-index:2;font-weight:normal;";
    th.textContent=lbl;
    thead.appendChild(th);
  });
  tbl.appendChild(thead);

  for(let r=0;r<ROWS;r++){
    const tr=document.createElement("tr");

// ===================== parking_approval =====================
GIMMICKS.parking_approval = ctx=>{
  const c=docCard(ctx.teammate,"사장님 차량을 지정 구역에 주차해주세요."); stageEl.appendChild(c);
  const CW=366,CH=290;
  const cv=document.createElement("canvas"); cv.width=CW;cv.height=CH;
  cv.style.cssText="display:block;margin:6px auto;border:1px solid #aaa;";
  c.appendChild(cv);
  const g=cv.getContext("2d");

  // Layout
  const BY=72,WY=13; // building height, walk height
  const PARK_Y=BY+WY, PARK_H=62; // parking row
  const LANE_Y=PARK_Y+PARK_H, LANE_H=30; // horizontal access lane
  const OY=LANE_Y+LANE_H; // obstacle zone start

  // 사장님 자리 — left spot
  const TARGET={x:8,y:PARK_Y,w:56,h:PARK_H};

  // Parked cars in other spots (collision = fail)
  const PCARS=[
    {x:76,y:PARK_Y,w:56,h:PARK_H,color:'#c0392b'},
    {x:144,y:PARK_Y,w:56,h:PARK_H,color:'#2471a3'},
    {x:212,y:PARK_Y,w:56,h:PARK_H,color:'#7f8c8d'},
    {x:280,y:PARK_Y,w:56,h:PARK_H,color:'#8e44ad'},
  ];

  // Static obstacles in corridor (hit = fail). Two side walls + center pillar + parked cars blocking
  const WALLS=[
    {x:0,   y:OY,   w:42, h:50,color:'#666'}, // left wall
    {x:324, y:OY,   w:42, h:50,color:'#666'}, // right wall
    {x:155, y:OY+15,w:56, h:20,color:'#888'}, // center concrete barrier
    {x:80,  y:OY+55,w:52, h:52,color:'#c0392b'}, // parked car A
    {x:234, y:OY+50,w:52, h:52,color:'#2471a3'}, // parked car B
    {x:0,   y:OY+115,w:105,h:12,color:'#777'}, // bottom barrier L
    {x:261, y:OY+115,w:105,h:12,color:'#777'}, // bottom barrier R
  ];

  // Traffic cones (circles, hit = fail)
  const CONES=[
    {x:44, y:OY+8,r:7},{x:322,y:OY+8,r:7},   // entry
    {x:100,y:OY+48,r:7},{x:266,y:OY+48,r:7},  // mid
    {x:140,y:OY+80,r:7},{x:226,y:OY+80,r:7},  // inner
  ];

  const CAR_W=22,CAR_H=40,ACCEL=0.09,FRIC=0.91,MSPD=2.2,TURN=0.040;
  let px=183,py=268,pAngle=-Math.PI/2,pSpeed=0,done=false,holdT=0,raf=null;
  const keys={};
  const kd=e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();};
  const ku=e=>{keys[e.key]=false;};
  document.addEventListener('keydown',kd);document.addEventListener('keyup',ku);

  function corners(){
    const a=pAngle+Math.PI/2,cos=Math.cos(a),sin=Math.sin(a),hw=CAR_W*0.42,hh=CAR_H*0.42;
    return [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([lx,ly])=>[px+cos*lx-sin*ly,py+sin*lx+cos*ly]);
  }
  function hitsRect(r){return corners().some(([cx,cy])=>cx>r.x&&cx<r.x+r.w&&cy>r.y&&cy<r.y+r.h);}
  function hitsCone(c){return corners().some(([cx,cy])=>Math.hypot(cx-c.x,cy-c.y)<c.r+2);}

  function update(){
    if(done)return;
    const up=keys['w']||keys['W']||keys['ArrowUp'],dn=keys['s']||keys['S']||keys['ArrowDown'];
    const lt=keys['a']||keys['A']||keys['ArrowLeft'],rt=keys['d']||keys['D']||keys['ArrowRight'];
    if(up)pSpeed=Math.min(pSpeed+ACCEL,MSPD);
    else if(dn)pSpeed=Math.max(pSpeed-ACCEL,-MSPD*0.6);
    else pSpeed*=FRIC;
    if(Math.abs(pSpeed)<0.03)pSpeed=0;
    if(lt&&Math.abs(pSpeed)>0.05)pAngle-=TURN*(pSpeed>0?1:-1);
    if(rt&&Math.abs(pSpeed)>0.05)pAngle+=TURN*(pSpeed>0?1:-1);
    const nx=px+Math.cos(pAngle)*pSpeed,ny=py+Math.sin(pAngle)*pSpeed;
    // Boundary walls = stop
    if(nx-CAR_W/2<0||nx+CAR_W/2>CW||ny+CAR_H/2>CH||ny-CAR_H/2<BY){pSpeed*=-0.2;return;}
    px=nx;py=ny;
    // Obstacles = fail
    for(const pc of PCARS){if(hitsRect(pc)){if(!done){done=true;cleanup();ctx.onFail("충돌");}return;}}
    for(const w of WALLS){if(hitsRect(w)){if(!done){done=true;cleanup();ctx.onFail("충돌");}return;}}
    for(const c of CONES){if(hitsCone(c)){if(!done){done=true;cleanup();ctx.onFail("충돌");}return;}}
    // Park check
    const inB=px>TARGET.x+10&&px<TARGET.x+TARGET.w-10&&py>TARGET.y+10&&py<TARGET.y+TARGET.h-10;
    const ang=((pAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    const angOk=Math.min(Math.abs(ang-Math.PI*1.5),Math.PI*2-Math.abs(ang-Math.PI*1.5))<0.30;
    if(inB&&angOk&&Math.abs(pSpeed)<0.35){holdT++;if(holdT>70){done=true;cleanup();ctx.onSuccess();}}else holdT=0;
  }

  function drawCar(cx,cy,a,w,h,col){
    g.save();g.translate(cx,cy);g.rotate(a+Math.PI/2);
    g.fillStyle=col;g.fillRect(-w/2,-h/2,w,h);
    g.fillStyle='rgba(173,216,230,0.7)';g.fillRect(-w/2+2,-h/2+3,w-4,h*0.28);
    g.fillStyle='#111';[[-w/2-1.5,-h*0.27],[w/2-2.5,-h*0.27],[-w/2-1.5,h*0.18],[w/2-2.5,h*0.18]].forEach(([wx,wy])=>g.fillRect(wx,wy,4,7));
    g.restore();
  }

  function draw(){
    g.clearRect(0,0,CW,CH);
    g.fillStyle='#cdd8e4';g.fillRect(0,0,CW,BY);
    g.fillStyle='#b5ada0';g.fillRect(8,5,CW-16,BY-5);
    g.strokeStyle='#9a9080';g.lineWidth=1.5;g.strokeRect(8,5,CW-16,BY-5);
    for(let wx=22;wx<CW-30;wx+=44){g.fillStyle='#a8cde0';g.fillRect(wx,12,26,18);g.fillStyle='rgba(255,255,255,0.2)';g.fillRect(wx,12,11,18);}
    g.fillStyle='#1e3a5f';g.fillRect(CW/2-54,40,108,22);
    g.fillStyle='#fff';g.font='bold 12px 맑은 고딕,sans-serif';g.textAlign='center';g.textBaseline='middle';g.fillText('원더피플',CW/2,51);
    g.fillStyle='#c0b8aa';g.fillRect(0,BY,CW,WY);
    g.fillStyle='#3a3a3a';g.fillRect(0,PARK_Y,CW,PARK_H);
    // Target spot
    g.fillStyle='rgba(243,156,18,0.2)';g.fillRect(TARGET.x+1,TARGET.y+1,TARGET.w-2,TARGET.h-2);
    g.strokeStyle='#e67e22';g.lineWidth=2;g.strokeRect(TARGET.x,TARGET.y,TARGET.w,TARGET.h);
    g.fillStyle='#f0a500';g.font='bold 8px sans-serif';g.textAlign='center';g.textBaseline='top';
    g.fillText('사장님',TARGET.x+TARGET.w/2,TARGET.y+2);g.fillText('자리',TARGET.x+TARGET.w/2,TARGET.y+13);
    // Other spots
    PCARS.forEach(p=>{g.strokeStyle='#666';g.lineWidth=1;g.strokeRect(p.x,p.y,p.w,p.h);});
    // Lane
    g.fillStyle='#505050';g.fillRect(0,LANE_Y,CW,LANE_H);
    g.strokeStyle='rgba(255,255,0,0.25)';g.lineWidth=1;g.setLineDash([8,6]);
    g.beginPath();g.moveTo(0,LANE_Y+LANE_H/2);g.lineTo(CW,LANE_Y+LANE_H/2);g.stroke();g.setLineDash([]);
    // Road below lane
    g.fillStyle='#505050';g.fillRect(0,OY,CW,CH-OY);
    g.strokeStyle='rgba(255,255,255,0.2)';g.lineWidth=1;g.setLineDash([12,10]);
    g.beginPath();g.moveTo(CW/2,OY);g.lineTo(CW/2,CH);g.stroke();g.setLineDash([]);
    // Walls/barriers
    WALLS.forEach(w=>{g.fillStyle=w.color;g.fillRect(w.x,w.y,w.w,w.h);g.strokeStyle='#333';g.lineWidth=1;g.strokeRect(w.x,w.y,w.w,w.h);});
    // Wall cars windshields
    [{x:80,y:OY+55,w:52,h:52},{x:234,y:OY+50,w:52,h:52}].forEach(pc=>{
      drawCar(pc.x+pc.w/2,pc.y+pc.h/2,-Math.PI/2,pc.w-4,pc.h-4,pc===WALLS[3]?'#c0392b':'#2471a3');
    });
    // Cones
    CONES.forEach(c=>{
      g.fillStyle='#e67e22';g.beginPath();g.arc(c.x,c.y,c.r,0,Math.PI*2);g.fill();
      g.fillStyle='#fff';g.beginPath();g.arc(c.x,c.y,c.r*0.4,0,Math.PI*2);g.fill();
    });
    // Parked cars
    PCARS.forEach(p=>drawCar(p.x+p.w/2,p.y+p.h/2,-Math.PI/2,p.w-4,p.h-4,p.color));
    // Player
    drawCar(px,py,pAngle,CAR_W,CAR_H,'#e74c3c');
    if(holdT>0){g.fillStyle='rgba(0,0,0,0.35)';g.fillRect(px-18,py-28,36,5);g.fillStyle='#27ae60';g.fillRect(px-18,py-28,36*(holdT/70),5);}
    g.fillStyle='rgba(0,0,0,0.45)';g.fillRect(3,CH-14,116,12);
    g.fillStyle='#eee';g.font='8px sans-serif';g.textAlign='left';g.textBaseline='middle';g.fillText('WASD / 방향키',7,CH-8);
  }

  function loop(){if(done)return;update();draw();raf=requestAnimationFrame(loop);}
  raf=requestAnimationFrame(loop);
  function cleanup(){if(raf)cancelAnimationFrame(raf);document.removeEventListener('keydown',kd);document.removeEventListener('keyup',ku);}
  return cleanup;
};

  const fakeTexts=["반대합니다","보류합니다","거절합니다","검토합니다","동의하지 않습니다"];
  const typos=["동의합니디","동의힙니다","동의합ㄴ니다","동의합니다.","동의 합니다"];
  let done=false, timers=[], ivs=[];

  // Real button styles: neutral gray, small, no green
  const realBtnStyle="font-size:11px;padding:2px 8px;background:#8899aa;color:#fff;border:none;border-radius:2px;cursor:pointer;";

  [realBtn].filter(Boolean).forEach(rb=>{

  });

  function setGreen(btn){btn.style.background="#27ae60";btn.style.color="#fff";}

  function makeFake(type){
    const btn=document.createElement("button");
    btn.style.cssText="border:none;padding:5px 14px;border-radius:3px;cursor:pointer;font-size:13px;transition:none;";
    btn.onclick=()=>{if(!done){done=true;cleanup();ctx.onFail("처리 오류");}};

    if(type==="rapid"){
      // Green "동의합니다" briefly, red for other texts — all fail
      const cycle=[
        {t:"동의합니다",green:true,dur:300},
        {t:"반대합니다",green:false,dur:700},
        {t:"거절합니다",green:false,dur:600},
        {t:"보류합니다",green:false,dur:650},
      ];
      let ci=0;
      function step(){
        const cur=cycle[ci];
        btn.textContent=cur.t;
        cur.green?setGreen(btn):setRed(btn);
        ci=(ci+1)%cycle.length;
        const iv2=setTimeout(step,cur.dur);
        ivs.push(iv2);
      }
      step();
    } else if(type==="hover_text"){
      // Shows a fake text, hover shows another fake text
      btn.textContent=fakeTexts[Math.floor(Math.random()*fakeTexts.length)];
      setRed(btn);
      const alt=fakeTexts[Math.floor(Math.random()*fakeTexts.length)];
      btn.addEventListener("mouseenter",()=>{btn.textContent=alt;});
      btn.addEventListener("mouseleave",()=>{btn.textContent=btn.dataset.orig||btn.textContent;});
    } else if(type==="hover_shift"){
      // Shows a typo, shifts on hover
      btn.textContent=typos[Math.floor(Math.random()*typos.length)];
      setRed(btn);
      btn.addEventListener("mouseenter",()=>{btn.style.transform="translateY(3px)";});
      btn.addEventListener("mouseleave",()=>{btn.style.transform="";});
    } else {
      // plain: just a wrong text, red
      btn.textContent=fakeTexts[Math.floor(Math.random()*fakeTexts.length)];
      setRed(btn);
    }
    return btn;
  }

  shuffle(["rapid","hover_text","hover_shift","plain"]).forEach(t=>actionArea.appendChild(makeFake(t)));
  c.appendChild(actionArea);
  return cleanup;
};

// ===================== START / RUN =====================
function startRun(){
  clearStage();
  state.usedWordOrder=false;
  // 미니게임(캔버스 인터랙티브) 65%, 콤보번들(단순클릭묶음) 35%
  const MINI_SET=new Set(['conveyor_approval','running_button','brick_approval','falling_approval','whack_approval','catch_approval','tilt_approval','fold_approval','escape_approval','forbidden_zones','assemble_approval','spot_difference','DecoyRapidButton','excel_approval','parking_approval']);
  const allK=Object.keys(GIMMICKS).filter(k=>k!=='boss_send_to_all');
  const NEW_MINI=['tilt_approval','fold_approval','escape_approval'].filter(k=>GIMMICKS[k]);
  const oldMiniPool=shuffle(allK.filter(k=>MINI_SET.has(k)&&!NEW_MINI.includes(k)));
  const comboPool=shuffle(allK.filter(k=>k.startsWith('combo_')));
  // 65% 미니: 신규4 + 구5 = 9스테이지
  // 35% 콤보번들: 5스테이지 (total=14)
  const miniN=Math.min(oldMiniPool.length,5);
  const comboN=Math.min(comboPool.length,5);
  const tagged=shuffle([...NEW_MINI.map(k=>({k,c:'m'})),...oldMiniPool.slice(0,miniN).map(k=>({k,c:'m'})),...comboPool.slice(0,comboN).map(k=>({k,c:'o'}))]);
  const result=[],pool=[...tagged];
  while(pool.length){const last=result.length?result[result.length-1].c:null;let i=pool.findIndex(x=>x.c!==last);if(i===-1)i=0;result.push(pool.splice(i,1)[0]);}
  state.order=result.map(x=>x.k);
  state.teammates=shuffle(NAMES);
  state.stage=1;
  loadStage();
}
